<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duel de Drapeaux - Multijoueur</title>
    <link rel="stylesheet" href="style.css">
    <!-- On force le chemin absolu pour Render -->
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .neo-input {
            font-family: 'Fredoka', 'Segoe UI', sans-serif;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: 700;
            border: 4px solid #1e1e1e;
            border-radius: 8px;
            box-shadow: 4px 4px 0px #1e1e1e;
            width: 100%;
            max-width: 300px;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        .neo-input:focus {
            outline: none;
            background-color: #f8fafc;
        }
        .join-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: stretch;
            max-width: 400px;
            margin: 0 auto;
        }
        .join-container .neo-input {
            margin-bottom: 0;
            width: 150px;
            text-transform: uppercase;
        }
        .join-container .btn-start {
            margin-top: 0;
            flex: 1;
            padding: 15px;
        }
        .or-divider {
            margin: 20px 0;
            font-weight: 700;
            font-size: 1.2rem;
            color: #1e1e1e;
        }
        /* Boutons désactivés par défaut */
        button:disabled {
            background-color: #cbd5e1 !important;
            color: #64748b !important;
            cursor: not-allowed;
            box-shadow: none !important;
            transform: none !important;
        }
    </style>
</head>
<body>

    <!-- Écran d'accueil -->
    <div class="window-box" id="start-screen">
        <h1>Duel de Drapeaux</h1>
        <p class="subtitle">Prêt à bluffer tes amis ?</p>
        
        <input type="text" id="pseudoInput" class="neo-input" placeholder="TON PSEUDO" maxlength="15" autocomplete="off">
        
        <!-- Les boutons sont désactivés par défaut -->
        <button id="btn-create" class="btn-start" style="margin-top:0;" disabled onclick="createRoom()">CONNEXION SERVEUR...</button>
        
        <div class="or-divider">OU</div>
        
        <div class="join-container">
            <input type="text" id="codeInput" class="neo-input" placeholder="CODE" maxlength="4" autocomplete="off">
            <button id="btn-join" class="btn-start" disabled onclick="joinRoom()">...</button>
        </div>
    </div>

    <!-- Écran d'attente -->
    <div class="window-box" id="waiting-screen" style="display: none; align-items: center; flex-direction: column;">
        <h1>Salon Privé</h1>
        <p class="subtitle">Transmets ce code à ton adversaire :</p>
        <div id="room-code-display" style="font-size: 4rem; font-weight: bold; background: #ffd93d; padding: 15px 40px; border: 4px solid #1e1e1e; border-radius: 12px; margin-bottom: 30px; box-shadow: 8px 8px 0px #1e1e1e; letter-spacing: 5px;">
            XXXX
        </div>
        <p style="font-size: 1.2rem; font-weight: 600; color: #ff6b6b; animation: pulse 1.5s infinite;">En attente de connexion...</p>
    </div>

    <!-- Écran de jeu -->
    <div class="window-box" id="game-area" style="display: none;">
        <div id="message">Prépare-toi...</div>
        
        <div class="timers">
            <div id="player0" class="player">
                <span id="name0">JOUEUR 1</span>
                <span id="time0" class="time">60.0</span>
            </div>
            <div id="player1" class="player">
                <span id="name1">JOUEUR 2</span>
                <span id="time1" class="time">60.0</span>
            </div>
        </div>

        <div class="flag-container">
            <img id="flag-image" src="" alt="Drapeau">
        </div>
        
        <div id="options" class="options-grid"></div>
    </div>

    <script>
        // Connexion sécurisée pour Render
        const socket = io('/', { path: '/socket.io' });
        
        let myPlayerIndex = null;
        let isMyTurn = false;

        // DÉTECTION DE LA CONNEXION (Allume les boutons)
        socket.on("connect", () => {
            console.log("Connecté à Render ! ID:", socket.id);
            
            const btnCreate = document.getElementById("btn-create");
            btnCreate.disabled = false;
            btnCreate.innerText = "CRÉER UN SALON PRIVÉ";
            btnCreate.style.backgroundColor = "#ffd93d"; // Jaune

            const btnJoin = document.getElementById("btn-join");
            btnJoin.disabled = false;
            btnJoin.innerText = "REJOINDRE";
            btnJoin.style.backgroundColor = "#3b82f6"; // Bleu
            btnJoin.style.color = "white";
        });

        socket.on("connect_error", (err) => {
            console.error("Erreur de connexion:", err);
            document.getElementById("btn-create").innerText = "ERREUR RÉSEAU";
        });

        function getPseudo() {
            const pseudo = document.getElementById("pseudoInput").value.trim();
            return pseudo || "Anonyme";
        }

        function createRoom() {
            console.log("Création demandée...");
            socket.emit("drapeaux_createRoom", getPseudo());
        }

        function joinRoom() {
            const code = document.getElementById("codeInput").value.trim();
            if (code.length !== 4) return alert("Le code doit faire 4 lettres.");
            socket.emit("drapeaux_joinRoom", { code: code, username: getPseudo() });
        }

        socket.on("drapeaux_roomCreated", (code) => {
            console.log("Salon créé :", code);
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("waiting-screen").style.display = "flex";
            document.getElementById("room-code-display").innerText = code;
        });

        socket.on("drapeaux_roomError", (msg) => {
            alert(msg);
        });

        socket.on("drapeaux_gameStart", (data) => {
            myPlayerIndex = data.playerIndex;
            
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("waiting-screen").style.display = "none";
            document.getElementById("game-area").style.display = "flex";
            document.getElementById("flag-image").style.display = "block";
            
            const p1Tag = myPlayerIndex === 0 ? " <span style='color:#ffd93d; font-size:1rem;'>(TOI)</span>" : "";
            const p2Tag = myPlayerIndex === 1 ? " <span style='color:#ffd93d; font-size:1rem;'>(TOI)</span>" : "";
            
            document.getElementById("name0").innerHTML = data.p1Name + p1Tag;
            document.getElementById("name1").innerHTML = data.p2Name + p2Tag;
        });

        socket.on("drapeaux_newQuestion", (data) => {
            isMyTurn = (data.currentPlayer === myPlayerIndex);
            
            document.getElementById("flag-image").src = `https://flagcdn.com/w320/${data.flagCode}.png`;
            
            const msgEl = document.getElementById("message");
            if (isMyTurn) {
                msgEl.innerText = "C'EST TON TOUR !";
                msgEl.style.color = "#1e1e1e";
            } else {
                msgEl.innerText = "AU TOUR DE L'ADVERSAIRE...";
                msgEl.style.color = "#ef4444";
            }

            const optionsContainer = document.getElementById("options");
            optionsContainer.innerHTML = "";

            data.options.forEach(option => {
                const btn = document.createElement("button");
                btn.className = "btn-option";
                btn.innerText = option.name;
                btn.dataset.code = option.code; 
                
                if (!isMyTurn) btn.disabled = true;

                btn.onclick = () => {
                    if (isMyTurn) socket.emit("drapeaux_submitAnswer", option.code);
                };
                optionsContainer.appendChild(btn);
            });
        });

        socket.on("drapeaux_timerUpdate", (data) => {
            document.getElementById("time0").innerText = data.times[0].toFixed(1);
            document.getElementById("time1").innerText = data.times[1].toFixed(1);

            if (data.currentPlayer === 0) {
                document.getElementById("player0").classList.add("active");
                document.getElementById("player1").classList.remove("active");
            } else {
                document.getElementById("player1").classList.add("active");
                document.getElementById("player0").classList.remove("active");
            }
        });

        socket.on("drapeaux_correctAnswer", (data) => {
            const buttons = document.querySelectorAll(".btn-option");
            buttons.forEach(btn => {
                btn.disabled = true;
                if(btn.dataset.code === data.correctCode) {
                    btn.classList.add("correct");
                }
            });
        });

        socket.on("drapeaux_wrongAnswer", (data) => {
            const buttons = document.querySelectorAll(".btn-option");
            buttons.forEach(btn => {
                if(btn.dataset.code === data.wrongCode) {
                    btn.classList.add("wrong");
                    btn.disabled = true;
                }
            });
        });

        socket.on("drapeaux_gameOver", (data) => {
            const msgEl = document.getElementById("message");
            if (data.winner === myPlayerIndex) {
                msgEl.innerText = "🏆 TU AS GAGNÉ !";
                msgEl.style.color = "#4ade80";
            } else {
                msgEl.innerText = "💀 TEMPS ÉCOULÉ, TU AS PERDU !";
                msgEl.style.color = "#ef4444";
            }
            
            const buttons = document.querySelectorAll(".btn-option");
            buttons.forEach(btn => btn.disabled = true);
            isMyTurn = false;
        });

        socket.on("drapeaux_playerDisconnected", () => {
            alert("L'adversaire s'est déconnecté. Le salon est fermé.");
            window.location.reload();
        });
    </script>
</body>
</html>
