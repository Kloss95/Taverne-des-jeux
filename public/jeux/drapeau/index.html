<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duel de Drapeaux - Multijoueur</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    
    <style>
        /* --- CORRECTIONS VISUELLES --- */
        .flag-container {
            border: none !important; /* Enlève les pointillés */
            background-color: transparent !important; /* Enlève le fond gris */
            height: 220px !important;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px auto;
            width: 100%;
        }
        
        #flag-image {
            display: none; /* Caché au menu, forcé à "block" pendant le jeu */
            max-height: 200px !important;
            width: auto !important;
            border: 4px solid #1e1e1e !important;
            border-radius: 8px !important;
            box-shadow: 6px 6px 0px #1e1e1e !important;
            background-color: white !important;
            object-fit: contain;
        }

        /* --- STYLES EXISTANTS --- */
        .neo-input {
            font-family: 'Fredoka', 'Segoe UI', sans-serif;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: 700;
            border: var(--border-width, 4px) solid var(--black, #1e1e1e);
            border-radius: 8px;
            box-shadow: 4px 4px 0px var(--black, #1e1e1e);
            width: 100%;
            max-width: 300px;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        .neo-input:focus {
            outline: none;
            background-color: #f8fafc;
        }
        .join-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: stretch;
            max-width: 400px;
            margin: 0 auto;
        }
        .join-container .neo-input {
            margin-bottom: 0;
            width: 150px;
            text-transform: uppercase;
        }
        .join-container .btn-start {
            margin-top: 0;
            flex: 1;
            padding: 15px;
        }
        .or-divider {
            margin: 20px 0;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--black, #1e1e1e);
        }
        button:disabled {
            background-color: #cbd5e1 !important;
            color: #64748b !important;
            cursor: not-allowed;
            box-shadow: none !important;
            transform: none !important;
        }
        .score {
            font-size: 1.2rem;
            color: #1e1e1e;
            background: #f8fafc;
            padding: 5px 10px;
            border-radius: 8px;
            border: 2px solid #1e1e1e;
            margin-top: 10px;
            display: inline-block;
        }
        #countdown-screen {
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        #countdown-number {
            font-size: 6rem;
            font-weight: 800;
            color: var(--yellow, #ffd93d);
            text-shadow: 4px 4px 0px #1e1e1e;
            animation: pop 1s infinite;
        }
        @keyframes pop {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.2); }
            100% { transform: scale(0.8); }
        }
        #btn-replay {
            display: none;
            background-color: var(--blue, #3b82f6);
            color: white;
            margin-top: 20px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="window-box" id="start-screen">
        <h1>Duel de Drapeaux</h1>
        <p class="subtitle">Prêt à bluffer tes amis ?</p>
        
        <input type="text" id="pseudoInput" class="neo-input" placeholder="TON PSEUDO" maxlength="15" autocomplete="off">
        
        <button id="btn-create" class="btn-start" style="margin-top:0;" disabled onclick="createRoom()">CONNEXION SERVEUR...</button>
        
        <div class="or-divider">OU</div>
        
        <div class="join-container">
            <input type="text" id="codeInput" class="neo-input" placeholder="CODE" maxlength="4" autocomplete="off">
            <button id="btn-join" class="btn-start" disabled onclick="joinRoom()">...</button>
        </div>
    </div>

    <div class="window-box" id="waiting-screen" style="display: none; align-items: center; flex-direction: column;">
        <h1>Salon Privé</h1>
        <p class="subtitle">Transmets ce code à ton adversaire :</p>
        <div id="room-code-display" style="font-size: 4rem; font-weight: bold; background: var(--yellow, #ffd93d); padding: 15px 40px; border: var(--border-width, 4px) solid var(--black, #1e1e1e); border-radius: 12px; margin-bottom: 30px; box-shadow: 8px 8px 0px var(--black, #1e1e1e); letter-spacing: 5px;">
            XXXX
        </div>
        <p style="font-size: 1.2rem; font-weight: 600; color: var(--pink, #ff6b6b); animation: pulse 1.5s infinite;">En attente de connexion...</p>
    </div>

    <div class="window-box" id="countdown-screen">
        <h1>PRÉPAREZ-VOUS</h1>
        <div id="countdown-number">3</div>
    </div>

    <div class="window-box" id="game-area" style="display: none;">
        <div id="message">Prépare-toi...</div>
        
        <div class="timers">
            <div id="player0" class="player">
                <span id="name0">JOUEUR 1</span><br>
                <span class="score" id="score0">0 pts</span>
                <span id="time0" class="time">60.0</span>
            </div>
            <div id="player1" class="player">
                <span id="name1">JOUEUR 2</span><br>
                <span class="score" id="score1">0 pts</span>
                <span id="time1" class="time">60.0</span>
            </div>
        </div>

        <div class="flag-container">
            <img id="flag-image" src="" alt="Drapeau">
        </div>
        
        <div id="options" class="options-grid"></div>

        <button id="btn-replay" class="btn-start" onclick="playAgain()">REJOUER UNE PARTIE</button>
    </div>

    <script>
        const RENDER_URL = ""; 
        const socket = RENDER_URL ? io(RENDER_URL) : io();
        
        let myPlayerIndex = null;
        let isMyTurn = false;
        let p1GlobalName = "";
        let p2GlobalName = "";
        let cooldown = false; 

        socket.on("connect", () => {
            const btnCreate = document.getElementById("btn-create");
            btnCreate.disabled = false;
            btnCreate.innerText = "CRÉER UN SALON PRIVÉ";
            btnCreate.style.backgroundColor = "var(--yellow, #ffd93d)";

            const btnJoin = document.getElementById("btn-join");
            btnJoin.disabled = false;
            btnJoin.innerText = "REJOINDRE";
            btnJoin.style.backgroundColor = "var(--blue, #3b82f6)";
            btnJoin.style.color = "white";
        });

        socket.on("connect_error", () => {
            document.getElementById("btn-create").innerText = "ERREUR RÉSEAU";
        });

        function getPseudo() {
            const pseudo = document.getElementById("pseudoInput").value.trim();
            return pseudo || "Anonyme";
        }

        window.createRoom = function() {
            socket.emit("drapeaux_createRoom", getPseudo());
        }

        window.joinRoom = function() {
            const code = document.getElementById("codeInput").value.trim();
            if (code.length !== 4) return alert("Le code doit faire exactement 4 lettres.");
            socket.emit("drapeaux_joinRoom", { code: code.toUpperCase(), username: getPseudo() });
        }

        socket.on("drapeaux_roomCreated", (code) => {
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("waiting-screen").style.display = "flex";
            document.getElementById("room-code-display").innerText = code;
        });

        socket.on("drapeaux_roomError", (msg) => {
            alert(msg);
        });

        socket.on("drapeaux_startCountdown", (data) => {
            p1GlobalName = data.p1Name;
            p2GlobalName = data.p2Name;
            
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("waiting-screen").style.display = "none";
            document.getElementById("game-area").style.display = "none";
            document.getElementById("countdown-screen").style.display = "flex";
            
            let count = 3;
            document.getElementById("countdown-number").innerText = count;
            
            const countInterval = setInterval(() => {
                count--;
                if(count > 0) {
                    document.getElementById("countdown-number").innerText = count;
                } else if(count === 0) {
                    document.getElementById("countdown-number").innerText = "GO !";
                } else {
                    clearInterval(countInterval);
                }
            }, 1000);
        });

        socket.on("drapeaux_gameStart", (data) => {
            myPlayerIndex = data.playerIndex;
            
            document.getElementById("countdown-screen").style.display = "none";
            document.getElementById("game-area").style.display = "flex";
            
            // On force l'affichage de l'image ici
            document.getElementById("flag-image").style.display = "block";
            
            const btnReplay = document.getElementById("btn-replay");
            btnReplay.style.display = "none";
            btnReplay.innerText = "REJOUER UNE PARTIE";
            btnReplay.disabled = false;
            
            document.getElementById("score0").innerText = "0 pts";
            document.getElementById("score1").innerText = "0 pts";
            
            const p1Tag = myPlayerIndex === 0 ? " <span style='color:var(--yellow); font-size:1rem;'>(TOI)</span>" : "";
            const p2Tag = myPlayerIndex === 1 ? " <span style='color:var(--yellow); font-size:1rem;'>(TOI)</span>" : "";
            
            document.getElementById("name0").innerHTML = p1GlobalName + p1Tag;
            document.getElementById("name1").innerHTML = p2GlobalName + p2Tag;
        });

        socket.on("drapeaux_newQuestion", (data) => {
            isMyTurn = (data.currentPlayer === myPlayerIndex);
            cooldown = false; 
            
            const imgEl = document.getElementById("flag-image");
            imgEl.src = `https://flagcdn.com/w320/${data.flagCode}.png`;
            imgEl.style.setProperty("display", "block", "important"); // Sécurité absolue pour l'affichage
            
            const msgEl = document.getElementById("message");
            if (isMyTurn) {
                msgEl.innerText = "C'EST TON TOUR !";
                msgEl.style.color = "var(--black, #1e1e1e)";
            } else {
                msgEl.innerText = "AU TOUR DE L'ADVERSAIRE...";
                msgEl.style.color = "var(--red, #ef4444)";
            }

            const optionsContainer = document.getElementById("options");
            optionsContainer.innerHTML = "";

            data.options.forEach(option => {
                const btn = document.createElement("button");
                btn.className = "btn-option";
                btn.innerText = option.name;
                btn.dataset.code = option.code; 
                
                if (!isMyTurn) btn.disabled = true;

                btn.onclick = () => {
                    if (isMyTurn && !cooldown) socket.emit("drapeaux_submitAnswer", option.code);
                };
                optionsContainer.appendChild(btn);
            });
        });

        socket.on("drapeaux_timerUpdate", (data) => {
            const t0 = data.times[0] <= 0 ? 0 : data.times[0];
            const t1 = data.times[1] <= 0 ? 0 : data.times[1];

            document.getElementById("time0").innerText = t0.toFixed(1);
            document.getElementById("time1").innerText = t1.toFixed(1);

            if (data.currentPlayer === 0) {
                document.getElementById("player0").classList.add("active");
                document.getElementById("player1").classList.remove("active");
            } else {
                document.getElementById("player1").classList.add("active");
                document.getElementById("player0").classList.remove("active");
            }
        });

        socket.on("drapeaux_correctAnswer", (data) => {
            document.getElementById("score0").innerText = data.scores[0] + " pts";
            document.getElementById("score1").innerText = data.scores[1] + " pts";

            const buttons = document.querySelectorAll(".btn-option");
            buttons.forEach(btn => {
                btn.disabled = true;
                if(btn.dataset.code === data.correctCode) {
                    btn.classList.add("correct");
                }
            });
        });

        socket.on("drapeaux_wrongAnswer", (data) => {
            const buttons = document.querySelectorAll(".btn-option");
            buttons.forEach(btn => {
                if(btn.dataset.code === data.wrongCode) {
                    btn.classList.add("wrong");
                    btn.disabled = true;
                }
            });

            if (isMyTurn) {
                cooldown = true;
                setTimeout(() => {
                    cooldown = false;
                }, 1000);
            }
        });

        socket.on("drapeaux_gameOver", (data) => {
            const msgEl = document.getElementById("message");
            if (data.winner === myPlayerIndex) {
                msgEl.innerText = "🏆 TU AS GAGNÉ !";
                msgEl.style.color = "var(--green, #4ade80)";
            } else {
                msgEl.innerText = "💀 TEMPS ÉCOULÉ, TU AS PERDU !";
                msgEl.style.color = "var(--red, #ef4444)";
            }
            
            const buttons = document.querySelectorAll(".btn-option");
            buttons.forEach(btn => btn.disabled = true);
            isMyTurn = false;

            document.getElementById("btn-replay").style.display = "block";
        });

        window.playAgain = function() {
            document.getElementById("btn-replay").innerText = "EN ATTENTE DE L'ADVERSAIRE...";
            document.getElementById("btn-replay").disabled = true;
            socket.emit("drapeaux_playAgain");
        };

        socket.on("drapeaux_playerDisconnected", () => {
            alert("L'adversaire s'est déconnecté. Le salon est fermé.");
            window.location.reload();
        });
    </script>
</body>
</html>
