<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            background-color: #11051c; /* Fond très sombre */
            color: #ff9eb5; /* Pastel pink */
            font-family: 'VT323', monospace;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; margin: 0; text-align: center; user-select: none;
            /* Une lueur interne douce pour l'ambiance CRT */
            box-shadow: inset 0 0 50px rgba(247, 37, 133, 0.2);
        }
        h1 { 
            font-size: 55px; margin-bottom: 5px; 
            color: #fdffb6; /* Pastel yellow */
            text-shadow: 4px 4px 0px #f72585; /* Ombre décalée très arcade */
            letter-spacing: 3px;
        }
        p { font-size: 26px; margin: 5px 0; color: #a0c4ff; /* Pastel blue */}
        .blink { 
            animation: pulse 1.5s infinite; 
            margin-top: 50px; 
            font-size: 30px;
            color: #4cc9f0; /* Neon cyan */
            background: rgba(76, 201, 240, 0.1);
            padding: 10px 20px;
            border-radius: 5px;
            border: 1px solid #4cc9f0;
        }
        @keyframes pulse { 
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; box-shadow: 0 0 15px #4cc9f0; } 
        }
    </style>
</head>
<body>
    <h1>NUTRABOX 2000</h1>
    <p>SYSTÈME OPÉRATIONNEL</p>
    <div class="blink">SWIPEZ OU UTILISEZ LES FLÈCHES</div>
</body>
</html>
