<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw Hockey</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --border-color: #151515;
            --bg-color: #fceea7; /* Fond jaune/beige clair */
            --box-bg: #ffffff;
            --primary-color: #ff5e5e; /* Rouge corail pour le palet */
            --secondary-color: #4ade80; /* Vert pour prêt/notre zone */
            --warning-color: #ffb703; /* Jaune/orange pour cooldown */
            --enemy-color: #a78bfa; /* Violet pour la zone adverse */
        }

        body { 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: var(--bg-color); 
            /* Motif à pois type BD/Pop-art */
            background-image: radial-gradient(#15151530 2px, transparent 2px);
            background-size: 24px 24px;
            color: var(--border-color); 
            font-family: 'Fredoka', sans-serif; 
            overflow: hidden; 
        }

        /* Classe utilitaire pour le style néobrutaliste */
        .neo-box {
            background-color: var(--box-bg);
            border: 4px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 6px 6px 0px var(--border-color);
        }

        .header {
            padding: 10px 20px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }

        .cooldown-container {
            width: 400px;
            height: 40px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #cooldown-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background-color: var(--warning-color);
            transition: width 0.1s linear;
            z-index: 1;
        }

        #cooldown-fill.ready {
            background-color: var(--secondary-color);
        }

        .cooldown-text {
            position: relative;
            z-index: 2;
            font-weight: 700;
            font-size: 18px;
            text-transform: uppercase;
        }

        canvas { 
            background-color: var(--box-bg); 
            cursor: crosshair; 
        }
    </style>
</head>
<body>

    <div class="header neo-box">
        <h1>🏒 Draw Hockey</h1>
    </div>

    <div class="cooldown-container neo-box">
        <div id="cooldown-fill" class="ready"></div>
        <span class="cooldown-text" id="cooldown-label">PINCEAU PRÊT</span>
    </div>

    <canvas id="gameCanvas" width="400" height="600" class="neo-box"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const cooldownFill = document.getElementById('cooldown-fill');
        const cooldownLabel = document.getElementById('cooldown-label');

        // Variables de jeu
        const COOLDOWN_TIME = 1000; 
        let lastDrawTime = 0;
        let isDrawing = false;
        let currentLine = null;
        let lines = [];
        const TARGET_SPEED = 6; 

        let puck = { x: 200, y: 450, vx: 5, vy: -5, radius: 14 };

        canvas.addEventListener('mousedown', (e) => {
            if (Date.now() - lastDrawTime < COOLDOWN_TIME) return;
            const rect = canvas.getBoundingClientRect();
            isDrawing = true;
            currentLine = { 
                x1: e.clientX - rect.left, 
                y1: e.clientY - rect.top, 
                x2: e.clientX - rect.left, 
                y2: e.clientY - rect.top 
            };
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            currentLine.x2 = e.clientX - rect.left;
            currentLine.y2 = e.clientY - rect.top;
        });

        canvas.addEventListener('mouseup', () => {
            if (!isDrawing) return;
            isDrawing = false;
            const dist = Math.hypot(currentLine.x2 - currentLine.x1, currentLine.y2 - currentLine.y1);
            if (dist > 10) {
                lines.push(currentLine);
                lastDrawTime = Date.now();
                if (lines.length > 4) lines.shift(); // Garde max 4 lignes
            }
            currentLine = null;
        });

        function normalizeSpeed(vx, vy) {
            let speed = Math.hypot(vx, vy);
            let newSpeed = (speed * 0.5) + (TARGET_SPEED * 0.5);
            let ratio = newSpeed / speed;
            return { vx: vx * ratio, vy: vy * ratio };
        }

        function update() {
            puck.x += puck.vx;
            puck.y += puck.vy;

            // Rebond murs (avec la taille du rayon prise en compte)
            if (puck.x - puck.radius < 0) { puck.x = puck.radius; puck.vx *= -1; let ns = normalizeSpeed(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }
            if (puck.x + puck.radius > canvas.width) { puck.x = canvas.width - puck.radius; puck.vx *= -1; let ns = normalizeSpeed(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }
            if (puck.y - puck.radius < 0) { puck.y = puck.radius; puck.vy *= -1; let ns = normalizeSpeed(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }
            if (puck.y + puck.radius > canvas.height) { puck.y = canvas.height - puck.radius; puck.vy *= -1; let ns = normalizeSpeed(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }

            // Collisions lignes
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                let abx = line.x2 - line.x1; let aby = line.y2 - line.y1;
                let apx = puck.x - line.x1; let apy = puck.y - line.y1;

                let t = (apx * abx + apy * aby) / (abx * abx + aby * aby);
                t = Math.max(0, Math.min(1, t)); 

                let closestX = line.x1 + t * abx; let closestY = line.y1 + t * aby;
                let dist = Math.hypot(puck.x - closestX, puck.y - closestY);

                if (dist < puck.radius + 4) { // +4 pour compenser l'épaisseur visuelle du trait
                    let nx = (puck.x - closestX) / dist; let ny = (puck.y - closestY) / dist;
                    let dot = puck.vx * nx + puck.vy * ny;
                    
                    if (dot < 0) {
                        puck.vx -= 2 * dot * nx;
                        puck.vy -= 2 * dot * ny;

                        let midY = (line.y1 + line.y2) / 2;
                        if (midY < canvas.height / 2) {
                            puck.vx *= 0.7; puck.vy *= 0.7; // Malus zone adverse
                        } else {
                            puck.vx *= 1.15; puck.vy *= 1.15; // Boost notre zone
                        }

                        lines.splice(i, 1);
                        break;
                    }
                }
            }

            // UI Cooldown
            let timePassed = Date.now() - lastDrawTime;
            if (timePassed < COOLDOWN_TIME) {
                cooldownFill.style.width = (timePassed / COOLDOWN_TIME) * 100 + '%';
                cooldownFill.classList.remove('ready');
                cooldownLabel.innerText = "RECHARGE...";
            } else {
                cooldownFill.style.width = '100%';
                cooldownFill.classList.add('ready');
                cooldownLabel.innerText = "PINCEAU PRÊT";
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Textes de fond (Zones)
            ctx.fillStyle = "rgba(21, 21, 21, 0.1)";
            ctx.font = "bold 28px Fredoka";
            ctx.textAlign = "center";
            ctx.fillText("ZONE ADVERSE", canvas.width / 2, canvas.height / 4);
            ctx.fillText("NOTRE ZONE", canvas.width / 2, canvas.height * 0.75);

            // Ligne médiane en pointillés noirs épais
            ctx.setLineDash([15, 15]);
            ctx.beginPath();
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.strokeStyle = "#151515";
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.setLineDash([]);

            // Fonction pour dessiner une ligne style "Néobrutaliste" (contour noir + intérieur couleur)
            function drawNeoLine(x1, y1, x2, y2, innerColor) {
                // Contour noir
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = "#151515";
                ctx.lineWidth = 14;
                ctx.lineCap = "round";
                ctx.stroke();
                
                // Intérieur coloré
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = innerColor;
                ctx.lineWidth = 6;
                ctx.lineCap = "round";
                ctx.stroke();
            }

            // Dessiner les lignes posées
            lines.forEach(line => {
                let midY = (line.y1 + line.y2) / 2;
                let color = midY < canvas.height / 2 ? "#a78bfa" : "#4ade80"; // Violet vs Vert
                drawNeoLine(line.x1, line.y1, line.x2, line.y2, color);
            });

            // Dessiner la ligne en cours de tracé (semi-transparente)
            if (currentLine) {
                ctx.globalAlpha = 0.5;
                let midY = (currentLine.y1 + currentLine.y2) / 2;
                let color = midY < canvas.height / 2 ? "#a78bfa" : "#4ade80";
                drawNeoLine(currentLine.x1, currentLine.y1, currentLine.x2, currentLine.y2, color);
                ctx.globalAlpha = 1.0;
            }

            // Dessiner le palet (Style néobrutaliste)
            ctx.beginPath();
            ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#ff5e5e"; // Rouge pop
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#151515"; // Contour noir
            ctx.stroke();
            ctx.closePath();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
