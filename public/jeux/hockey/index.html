<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw Hockey</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #1a1a2e; color: white; font-family: 'Fredoka', sans-serif; overflow: hidden; }
        canvas { background-color: #16213e; border: 4px solid #e94560; border-radius: 8px; box-shadow: 0 0 15px rgba(233, 69, 96, 0.5); cursor: crosshair; }
        #ui { position: absolute; top: 20px; text-align: center; pointer-events: none; }
        .cooldown-bar { width: 200px; height: 10px; background: #333; margin: 10px auto; border-radius: 5px; overflow: hidden; }
        #cooldown-fill { width: 100%; height: 100%; background: #0f3460; transition: width 0.1s linear; }
        .ready { background: #4ecca3 !important; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>Draw Hockey</h2>
        <p>Cooldown du pinceau :</p>
        <div class="cooldown-bar"><div id="cooldown-fill" class="ready"></div></div>
    </div>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const cooldownFill = document.getElementById('cooldown-fill');

        // Variables de jeu
        const COOLDOWN_TIME = 1000; // 1 seconde
        let lastDrawTime = 0;
        let isDrawing = false;
        let currentLine = null;
        let lines = [];
        const TARGET_SPEED = 6; // Vitesse "moyenne" appliquée par les murs

        let puck = { x: 200, y: 300, vx: 4, vy: -5, radius: 12 };

        // Écouteurs de dessin
        canvas.addEventListener('mousedown', (e) => {
            if (Date.now() - lastDrawTime < COOLDOWN_TIME) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            isDrawing = true;
            currentLine = { x1: mouseX, y1: mouseY, x2: mouseX, y2: mouseY };
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            currentLine.x2 = e.clientX - rect.left;
            currentLine.y2 = e.clientY - rect.top;
        });

        canvas.addEventListener('mouseup', () => {
            if (!isDrawing) return;
            isDrawing = false;
            // On ne garde la ligne que si elle a une taille minimale
            const dist = Math.hypot(currentLine.x2 - currentLine.x1, currentLine.y2 - currentLine.y1);
            if (dist > 10) {
                lines.push(currentLine);
                lastDrawTime = Date.now();
                // Garder seulement les 5 dernières lignes pour ne pas polluer l'écran
                if (lines.length > 5) lines.shift(); 
            }
            currentLine = null;
        });

        function normalizeSpeed(vx, vy) {
            let speed = Math.hypot(vx, vy);
            // Fusion entre la vitesse actuelle et la vitesse cible (force moyenne du mur)
            let newSpeed = (speed * 0.5) + (TARGET_SPEED * 0.5);
            let ratio = newSpeed / speed;
            return { vx: vx * ratio, vy: vy * ratio };
        }

        function update() {
            // Mouvement du palet
            puck.x += puck.vx;
            puck.y += puck.vy;

            // Rebond sur les murs avec application de la force moyenne
            if (puck.x - puck.radius < 0) { puck.x = puck.radius; puck.vx *= -1; let ns = normalizeSpeed(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }
            if (puck.x + puck.radius > canvas.width) { puck.x = canvas.width - puck.radius; puck.vx *= -1; let ns = normalizeSpeed(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }
            if (puck.y - puck.radius < 0) { puck.y = puck.radius; puck.vy *= -1; let ns = normalizeSpeed(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }
            if (puck.y + puck.radius > canvas.height) { puck.y = canvas.height - puck.radius; puck.vy *= -1; let ns = normalizeSpeed(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }

            // Collisions avec les lignes dessinées (Réflexion vectorielle)
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                let abx = line.x2 - line.x1;
                let aby = line.y2 - line.y1;
                let apx = puck.x - line.x1;
                let apy = puck.y - line.y1;

                let t = (apx * abx + apy * aby) / (abx * abx + aby * aby);
                t = Math.max(0, Math.min(1, t)); // Point le plus proche sur le segment

                let closestX = line.x1 + t * abx;
                let closestY = line.y1 + t * aby;

                let dist = Math.hypot(puck.x - closestX, puck.y - closestY);

                if (dist < puck.radius) {
                    // Normalisation du vecteur de collision
                    let nx = (puck.x - closestX) / dist;
                    let ny = (puck.y - closestY) / dist;

                    let dot = puck.vx * nx + puck.vy * ny;
                    
                    // Si le palet va vers la ligne
                    if (dot < 0) {
                        puck.vx -= 2 * dot * nx;
                        puck.vy -= 2 * dot * ny;

                        // Logique de terrain : Milieu Y du trait
                        let midY = (line.y1 + line.y2) / 2;
                        if (midY < canvas.height / 2) {
                            // Terrain adverse : Vitesse réduite
                            puck.vx *= 0.65; puck.vy *= 0.65;
                        } else {
                            // Notre terrain : Vitesse classique / léger boost
                            puck.vx *= 1.1; puck.vy *= 1.1;
                        }

                        // Détruire la ligne après le rebond (optionnel, rend le jeu plus dur)
                        lines.splice(i, 1);
                        break;
                    }
                }
            }

            // Mise à jour de la barre de cooldown UI
            let timePassed = Date.now() - lastDrawTime;
            if (timePassed < COOLDOWN_TIME) {
                cooldownFill.style.width = (timePassed / COOLDOWN_TIME) * 100 + '%';
                cooldownFill.classList.remove('ready');
            } else {
                cooldownFill.style.width = '100%';
                cooldownFill.classList.add('ready');
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dessiner la ligne médiane
            ctx.setLineDash([5, 15]);
            ctx.beginPath();
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.strokeStyle = "rgba(255, 255, 255, 0.2)";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.setLineDash([]);

            // Textes de zone
            ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
            ctx.font = "20px Fredoka";
            ctx.fillText("Zone Adverse (Ralentissement)", 60, canvas.height / 4);
            ctx.fillText("Notre Zone (Vitesse Normale)", 70, canvas.height * 0.75);

            // Dessiner les lignes posées
            ctx.strokeStyle = "#4ecca3";
            ctx.lineWidth = 4;
            ctx.lineCap = "round";
            lines.forEach(line => {
                ctx.beginPath();
                ctx.moveTo(line.x1, line.y1);
                ctx.lineTo(line.x2, line.y2);
                ctx.stroke();
            });

            // Dessiner la ligne en cours
            if (currentLine) {
                ctx.strokeStyle = "rgba(78, 204, 163, 0.5)";
                ctx.beginPath();
                ctx.moveTo(currentLine.x1, currentLine.y1);
                ctx.lineTo(currentLine.x2, currentLine.y2);
                ctx.stroke();
            }

            // Dessiner le palet
            ctx.beginPath();
            ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#e94560";
            ctx.fill();
            ctx.closePath();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
