<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw Hockey</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --border-color: #151515;
            --bg-color: #fceea7;
            --canvas-bg: #e2e8f0; 
            --primary-color: #ff5e5e;
            --secondary-color: #4ade80; 
            --warning-color: #F0C300; 
            --enemy-color: #a78bfa;   
            --fill-pct: 100%; /* Variable magique pour la jauge */
        }

        body { 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: var(--bg-color); 
            background-image: radial-gradient(#15151530 2px, transparent 2px);
            background-size: 24px 24px;
            color: var(--border-color); 
            font-family: 'Fredoka', sans-serif; 
            overflow-x: hidden; 
            padding: 10px;
            box-sizing: border-box;
        }

        .neo-box {
            background-color: var(--canvas-bg);
            border: 4px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 4px 4px 0px var(--border-color);
        }

        .header {
            background-color: #ffffff;
            padding: 10px 20px;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
        }

        /* Conteneur principal flexible */
        .game-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .panel-gauche { order: 1; display: flex; flex-direction: column; align-items: center; gap: 15px; width: 140px; }
        .panel-centre { order: 2; display: flex; justify-content: center; width: 100%; max-width: 500px; }
        .panel-droit  { order: 3; display: flex; flex-direction: column; align-items: center; gap: 15px; width: 140px; }

        /* Le Canvas devient 100% responsif */
        canvas { 
            width: 100%; 
            height: auto;
            aspect-ratio: 2 / 3; /* Garde toujours les proportions 500x750 */
            cursor: crosshair; 
            display: block;
            touch-action: none; /* Empêche le scroll quand on dessine sur mobile */
            background-color: var(--canvas-bg);
        }

        /* UI Gauche (Jauge Verticale par défaut) */
        .cooldown-wrapper {
            width: 40px;
            height: 300px;
            background-color: #ffffff;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
        }

        #cooldown-fill {
            position: absolute;
            bottom: 0; 
            left: 0;
            width: 100%;
            height: var(--fill-pct);
            background-color: var(--warning-color);
            transition: height 0.1s linear, width 0.1s linear, background-color 0.2s;
        }

        #cooldown-fill.ready { background-color: var(--secondary-color); }

        .cooldown-status {
            width: 100%;
            padding: 10px 0;
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            background-color: #ffffff;
        }

        /* UI Droite (Scores) */
        .score-box {
            background-color: #ffffff;
            width: 100%; 
            padding: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 5px;
            box-sizing: border-box;
        }

        .score-title {
            font-size: 14px;
            font-weight: 700;
            padding: 5px;
            border-radius: 6px;
            border: 3px solid var(--border-color);
        }

        .score-enemy .score-title { background-color: var(--enemy-color); }
        .score-player .score-title { background-color: var(--secondary-color); }
        .score-value { font-size: 48px; font-weight: 700; line-height: 1; }


        /* =========================================
           MODE MOBILE (Écrans < 768px)
           ========================================= */
        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                gap: 15px;
            }

            /* Les Scores passent en HAUT */
            .panel-droit {
                order: 1;
                flex-direction: row;
                width: 100%;
                max-width: 500px;
                justify-content: space-between;
            }

            /* Le terrain reste au MILIEU */
            .panel-centre { order: 2; }

            /* La Jauge passe en BAS et devient Horizontale */
            .panel-gauche {
                order: 3;
                flex-direction: row;
                width: 100%;
                max-width: 500px;
            }

            .cooldown-wrapper {
                width: 100%;
                height: 40px; /* Devient une barre de chargement horizontale */
            }

            #cooldown-fill {
                /* On inverse la logique : c'est la width qui grandit, plus la height */
                bottom: 0;
                left: 0;
                height: 100%;
                width: var(--fill-pct); 
            }

            .cooldown-status { width: 120px; }
        }
    </style>
</head>
<body>

    <div class="header neo-box">
        <h1>🏒 Draw Hockey</h1>
    </div>

    <div class="game-container">
        
        <div class="panel-gauche">
            <div class="cooldown-wrapper neo-box">
                <div id="cooldown-fill" class="ready"></div>
            </div>
            <div class="cooldown-status neo-box" id="cooldown-status">PRÊT</div>
        </div>

        <div class="panel-centre">
            <canvas id="gameCanvas" width="500" height="750" class="neo-box"></canvas>
        </div>
        
        <div class="panel-droit">
            <div class="score-box score-enemy neo-box">
                <div class="score-title">ADVERSAIRE</div>
                <div class="score-value" id="score-enemy">0</div>
            </div>
            <div class="score-box score-player neo-box">
                <div class="score-title">TOI</div>
                <div class="score-value" id="score-player">0</div>
            </div>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const cooldownFill = document.getElementById('cooldown-fill');
        const cooldownStatus = document.getElementById('cooldown-status');
        
        const scoreEnemyEl = document.getElementById('score-enemy');
        const scorePlayerEl = document.getElementById('score-player');

        const COOLDOWN_TIME = 1000; 
        const LIFESPAN = 1000; 
        
        const MIN_SPEED = 9;   
        const BOOST_SPEED = 14; 
        const MAX_SPEED = 22;  

        const GOAL_WIDTH = 140; 

        const COLOR_ENEMY = "#a78bfa";
        const COLOR_PLAYER = "#4ade80";
        const COLOR_PUCK = "#ff5e5e";

        let lastDrawTime = 0;
        let isDrawing = false;
        let currentPath = null;
        let drawnPaths = []; 
        
        let scores = { player: 0, enemy: 0 };
        let puck = { x: 250, y: 375, vx: 7, vy: -9, radius: 14 };

        const goalX1 = (canvas.width - GOAL_WIDTH) / 2;
        const goalX2 = goalX1 + GOAL_WIDTH;

        // Fonction magique pour calculer la vraie position (Responsive)
        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            // Facteur d'échelle (Taille réelle / Taille affichée CSS)
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX = e.clientX;
            let clientY = e.clientY;
            
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }

            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function startDraw(pos) {
            if (Date.now() - lastDrawTime < COOLDOWN_TIME) return;
            isDrawing = true;
            let x = Math.max(0, Math.min(canvas.width, pos.x));
            let y = Math.max(0, Math.min(canvas.height, pos.y));
            currentPath = [{ x, y }];
        }

        function moveDraw(pos) {
            if (!isDrawing || !currentPath) return;
            let x = Math.max(0, Math.min(canvas.width, pos.x));
            let y = Math.max(0, Math.min(canvas.height, pos.y));
            let lastPoint = currentPath[currentPath.length - 1];
            if (Math.hypot(x - lastPoint.x, y - lastPoint.y) > 5) {
                currentPath.push({ x, y });
            }
        }

        function endDraw() {
            if (!isDrawing) return;
            isDrawing = false;
            if (currentPath && currentPath.length > 1) {
                drawnPaths.push({ path: currentPath, timestamp: Date.now() });
                lastDrawTime = Date.now();
            }
            currentPath = null;
        }

        // Événements Souris
        canvas.addEventListener('mousedown', (e) => startDraw(getPointerPos(e)));
        window.addEventListener('mousemove', (e) => { if(isDrawing) moveDraw(getPointerPos(e)); });
        window.addEventListener('mouseup', endDraw);

        // Événements Tactiles
        canvas.addEventListener('touchstart', (e) => startDraw(getPointerPos(e)), { passive: false });
        window.addEventListener('touchmove', (e) => { if(isDrawing) moveDraw(getPointerPos(e)); }, { passive: false });
        window.addEventListener('touchend', endDraw);

        function normalizeSpeedWall(vx, vy) {
            let speed = Math.hypot(vx, vy);
            let newSpeed = Math.max(MIN_SPEED, speed * 0.9);
            let ratio = newSpeed / speed;
            return { vx: vx * ratio, vy: vy * ratio };
        }

        function resetPuck(whoScored) {
            puck.x = canvas.width / 2;
            puck.y = canvas.height / 2;
            puck.vx = (Math.random() > 0.5 ? 1 : -1);
            drawnPaths = []; 
            if (whoScored === 'enemy') puck.vy = -1.5; 
            else puck.vy = 1.5; 
            scoreEnemyEl.innerText = scores.enemy;
            scorePlayerEl.innerText = scores.player;
        }

        function update() {
            let now = Date.now();
            drawnPaths = drawnPaths.filter(p => now - p.timestamp < LIFESPAN);

            puck.x += puck.vx;
            puck.y += puck.vy;

            if (puck.x - puck.radius < 0) { puck.x = puck.radius; puck.vx *= -1; let ns = normalizeSpeedWall(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }
            if (puck.x + puck.radius > canvas.width) { puck.x = canvas.width - puck.radius; puck.vx *= -1; let ns = normalizeSpeedWall(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }
            
            if (puck.y - puck.radius < 0) { 
                if (puck.x > goalX1 && puck.x < goalX2) { scores.player++; resetPuck('player'); } 
                else { puck.y = puck.radius; puck.vy *= -1; let ns = normalizeSpeedWall(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }
            }

            if (puck.y + puck.radius > canvas.height) { 
                if (puck.x > goalX1 && puck.x < goalX2) { scores.enemy++; resetPuck('enemy'); } 
                else { puck.y = canvas.height - puck.radius; puck.vy *= -1; let ns = normalizeSpeedWall(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }
            }

            for (let i = drawnPaths.length - 1; i >= 0; i--) {
                let pathInfo = drawnPaths[i];
                let path = pathInfo.path;
                let collisionDetected = false;
                
                for (let j = 0; j < path.length - 1; j++) {
                    let p1 = path[j]; let p2 = path[j + 1];
                    let abx = p2.x - p1.x; let aby = p2.y - p1.y;
                    let apx = puck.x - p1.x; let apy = puck.y - p1.y;

                    let t = (apx * abx + apy * aby) / (abx * abx + aby * aby);
                    t = Math.max(0, Math.min(1, t)); 

                    let closestX = p1.x + t * abx; let closestY = p1.y + t * aby;
                    let dist = Math.hypot(puck.x - closestX, puck.y - closestY);

                    if (dist < puck.radius + 4) {
                        let nx = (puck.x - closestX) / dist; let ny = (puck.y - closestY) / dist;
                        let dot = puck.vx * nx + puck.vy * ny;
                        
                        if (dot < 0) {
                            puck.vx -= 2 * dot * nx; puck.vy -= 2 * dot * ny;
                            let currentSpeed = Math.hypot(puck.vx, puck.vy);
                            let newSpeed;
                            if (p1.y < canvas.height / 2) newSpeed = Math.max(MIN_SPEED, currentSpeed * 0.95); 
                            else newSpeed = Math.max(BOOST_SPEED, currentSpeed * 1.25); 
                            newSpeed = Math.min(newSpeed, MAX_SPEED); 

                            let ratio = newSpeed / currentSpeed;
                            puck.vx *= ratio; puck.vy *= ratio;
                            collisionDetected = true;
                            break; 
                        }
                    }
                }
                if (collisionDetected) drawnPaths.splice(i, 1);
            }

            // Gestion CSS pure pour la jauge
            let timePassed = now - lastDrawTime;
            if (timePassed < COOLDOWN_TIME) {
                // On met à jour la variable CSS --fill-pct (marche en vertical ET horizontal !)
                document.documentElement.style.setProperty('--fill-pct', (timePassed / COOLDOWN_TIME) * 100 + '%');
                cooldownFill.classList.remove('ready');
                cooldownStatus.innerText = "RECHARGE";
                cooldownStatus.style.backgroundColor = "var(--warning-color)";
            } else {
                document.documentElement.style.setProperty('--fill-pct', '100%');
                cooldownFill.classList.add('ready');
                cooldownStatus.innerText = "PRÊT";
                cooldownStatus.style.backgroundColor = "var(--secondary-color)";
            }
        }

        function drawNeoPath(path, innerColor, alpha = 1.0) {
            if (!path || path.length < 2) return;
            ctx.globalAlpha = alpha;
            ctx.beginPath();
            ctx.moveTo(path[0].x, path[0].y);
            for(let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
            ctx.strokeStyle = "#151515"; ctx.lineWidth = 14; ctx.lineJoin = "round"; ctx.lineCap = "round"; ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(path[0].x, path[0].y);
            for(let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
            ctx.strokeStyle = innerColor; ctx.lineWidth = 6; ctx.lineJoin = "round"; ctx.lineCap = "round"; ctx.stroke();
            ctx.globalAlpha = 1.0;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ZONES DES GARDIENS (Demi-cercles peints sur la glace)
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#151515";
            
            // Zone Ennemie
            ctx.beginPath();
            ctx.arc(canvas.width / 2, 0, 90, 0, Math.PI);
            ctx.fillStyle = "rgba(167, 139, 250, 0.25)"; // Violet transparent
            ctx.fill();
            ctx.stroke();

            // Notre Zone
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height, 90, Math.PI, 0);
            ctx.fillStyle = "rgba(74, 222, 128, 0.25)"; // Vert transparent
            ctx.fill();
            ctx.stroke();

            // CERCLE CENTRAL
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, 60, 0, Math.PI * 2);
            ctx.lineWidth = 6;
            ctx.strokeStyle = "rgba(21, 21, 21, 0.15)";
            ctx.stroke();

            // LIGNE MÉDIANE
            ctx.setLineDash([15, 15]);
            ctx.beginPath();
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.strokeStyle = "rgba(21, 21, 21, 0.25)";
            ctx.lineWidth = 6;
            ctx.stroke();
            ctx.setLineDash([]);

            // CAGES (Style Plat & Propre)
            ctx.lineWidth = 6;
            ctx.strokeStyle = "#151515";

            // Cage Ennemie
            ctx.fillStyle = COLOR_ENEMY;
            ctx.fillRect(goalX1, 0, GOAL_WIDTH, 15);
            ctx.strokeRect(goalX1, -3, GOAL_WIDTH, 18); // Le -3 cache la bordure haute hors du canvas

            // Notre Cage
            ctx.fillStyle = COLOR_PLAYER;
            ctx.fillRect(goalX1, canvas.height - 15, GOAL_WIDTH, 15);
            ctx.strokeRect(goalX1, canvas.height - 15, GOAL_WIDTH, 18);


            // TRAITS DESSINÉS
            drawnPaths.forEach(p => {
                let isTopZone = p.path[0].y < canvas.height / 2;
                let color = isTopZone ? COLOR_ENEMY : COLOR_PLAYER;
                drawNeoPath(p.path, color);
            });

            if (currentPath) {
                let isTopZone = currentPath[0].y < canvas.height / 2;
                let color = isTopZone ? COLOR_ENEMY : COLOR_PLAYER;
                drawNeoPath(currentPath, color, 0.5); 
            }

            // PALET
            ctx.beginPath();
            ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI * 2);
            ctx.fillStyle = COLOR_PUCK;
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#151515";
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(puck.x, puck.y, puck.radius * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = "#151515";
            ctx.fill();
            ctx.closePath();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
