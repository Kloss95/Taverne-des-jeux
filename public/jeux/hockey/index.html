<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw Hockey</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --border-color: #151515;
            --bg-color: #fceea7;
            --canvas-bg: #e2e8f0; 
            --primary-color: #ff5e5e;
            --secondary-color: #4ade80; 
            --warning-color: #F0C300; 
            --enemy-color: #a78bfa;   
        }

        body { 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: var(--bg-color); 
            background-image: radial-gradient(#15151530 2px, transparent 2px);
            background-size: 24px 24px;
            color: var(--border-color); 
            font-family: 'Fredoka', sans-serif; 
            overflow: hidden; 
        }

        .neo-box {
            background-color: var(--canvas-bg);
            border: 4px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 6px 6px 0px var(--border-color);
        }

        .header {
            background-color: #ffffff;
            padding: 10px 20px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
        }

        .game-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 160px; 
        }

        canvas { 
            cursor: crosshair; 
            display: block;
        }

        .cooldown-wrapper {
            width: 40px;
            height: 350px;
            background-color: #ffffff;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
        }

        #cooldown-fill {
            position: absolute;
            bottom: 0; 
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--warning-color);
            transition: height 0.1s linear;
        }

        #cooldown-fill.ready {
            background-color: var(--secondary-color);
        }

        .cooldown-status {
            width: 120px;
            padding: 10px 0;
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            background-color: #ffffff;
            transition: background-color 0.2s;
        }

        .score-box {
            background-color: #ffffff;
            width: 120px; 
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .score-title {
            font-size: 16px;
            font-weight: 700;
            padding: 5px;
            border-radius: 6px;
            border: 3px solid var(--border-color);
            box-shadow: 3px 3px 0px var(--border-color);
        }

        .score-enemy .score-title {
            background-color: var(--enemy-color);
        }

        .score-player .score-title {
            background-color: var(--secondary-color);
        }

        .score-value {
            font-size: 64px;
            font-weight: 700;
            line-height: 1;
        }

    </style>
</head>
<body>

    <div class="header neo-box">
        <h1>🏒 Draw Hockey</h1>
    </div>

    <div class="game-container">
        
        <div class="side-panel">
            <div class="cooldown-wrapper neo-box">
                <div id="cooldown-fill" class="ready"></div>
            </div>
            <div class="cooldown-status neo-box" id="cooldown-status">PRÊT</div>
        </div>

        <canvas id="gameCanvas" width="500" height="750" class="neo-box"></canvas>
        
        <div class="side-panel">
            <div class="score-box score-enemy neo-box">
                <div class="score-title">ADVERSAIRE</div>
                <div class="score-value" id="score-enemy">0</div>
            </div>
            <div class="score-box score-player neo-box">
                <div class="score-title">TOI</div>
                <div class="score-value" id="score-player">0</div>
            </div>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const cooldownFill = document.getElementById('cooldown-fill');
        const cooldownStatus = document.getElementById('cooldown-status');
        
        const scoreEnemyEl = document.getElementById('score-enemy');
        const scorePlayerEl = document.getElementById('score-player');

        // Constantes
        const COOLDOWN_TIME = 1000; 
        const LIFESPAN = 1000; 
        
        // Nouvelle gestion des vitesses
        const MIN_SPEED = 9;   // La balle ne descendra jamais en dessous de ça en jouant
        const BOOST_SPEED = 14; // Vitesse de propultion si touché dans notre zone
        const MAX_SPEED = 22;  // Limite anti-bug de collision

        const GOAL_WIDTH = 140; 
        const GOAL_DEPTH = 30; // Profondeur visuelle des cages

        const COLOR_ENEMY = "#a78bfa";
        const COLOR_PLAYER = "#4ade80";
        const COLOR_PUCK = "#ff5e5e";

        // Variables d'état
        let lastDrawTime = 0;
        let isDrawing = false;
        let currentPath = null;
        let drawnPaths = []; 
        
        let scores = { player: 0, enemy: 0 };
        let puck = { x: 250, y: 375, vx: 7, vy: -9, radius: 14 };

        const goalX1 = (canvas.width - GOAL_WIDTH) / 2;
        const goalX2 = goalX1 + GOAL_WIDTH;

        function startDraw(x, y) {
            if (Date.now() - lastDrawTime < COOLDOWN_TIME) return;
            isDrawing = true;
            x = Math.max(0, Math.min(canvas.width, x));
            y = Math.max(0, Math.min(canvas.height, y));
            currentPath = [{ x, y }];
        }

        function moveDraw(x, y) {
            if (!isDrawing || !currentPath) return;
            x = Math.max(0, Math.min(canvas.width, x));
            y = Math.max(0, Math.min(canvas.height, y));
            let lastPoint = currentPath[currentPath.length - 1];
            if (Math.hypot(x - lastPoint.x, y - lastPoint.y) > 5) {
                currentPath.push({ x, y });
            }
        }

        function endDraw() {
            if (!isDrawing) return;
            isDrawing = false;
            if (currentPath && currentPath.length > 1) {
                drawnPaths.push({ path: currentPath, timestamp: Date.now() });
                lastDrawTime = Date.now();
            }
            currentPath = null;
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            startDraw(e.clientX - rect.left, e.clientY - rect.top);
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            moveDraw(e.clientX - rect.left, e.clientY - rect.top);
        });
        window.addEventListener('mouseup', endDraw);

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            startDraw(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
        }, { passive: false });
        window.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            moveDraw(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
        }, { passive: false });
        window.addEventListener('touchend', endDraw);

        function normalizeSpeedWall(vx, vy) {
            let speed = Math.hypot(vx, vy);
            // Rebond sur un mur : on calme le jeu si c'était trop rapide, mais JAMAIS en dessous de MIN_SPEED
            let newSpeed = Math.max(MIN_SPEED, speed * 0.9);
            let ratio = newSpeed / speed;
            return { vx: vx * ratio, vy: vy * ratio };
        }

        function resetPuck(whoScored) {
            puck.x = canvas.width / 2;
            puck.y = canvas.height / 2;
            puck.vx = (Math.random() > 0.5 ? 1 : -1);
            
            drawnPaths = []; 

            if (whoScored === 'enemy') {
                puck.vy = -1.5; 
            } else {
                puck.vy = 1.5; 
            }

            scoreEnemyEl.innerText = scores.enemy;
            scorePlayerEl.innerText = scores.player;
        }

        function update() {
            let now = Date.now();
            drawnPaths = drawnPaths.filter(p => now - p.timestamp < LIFESPAN);

            puck.x += puck.vx;
            puck.y += puck.vy;

            // Murs latéraux
            if (puck.x - puck.radius < 0) { puck.x = puck.radius; puck.vx *= -1; let ns = normalizeSpeedWall(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }
            if (puck.x + puck.radius > canvas.width) { puck.x = canvas.width - puck.radius; puck.vx *= -1; let ns = normalizeSpeedWall(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }
            
            // Mur Haut (Cage ennemi)
            if (puck.y - puck.radius < 0) { 
                if (puck.x > goalX1 && puck.x < goalX2) {
                    scores.player++; resetPuck('player');
                } else {
                    puck.y = puck.radius; puck.vy *= -1; let ns = normalizeSpeedWall(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy;
                }
            }

            // Mur Bas (Notre Cage)
            if (puck.y + puck.radius > canvas.height) { 
                if (puck.x > goalX1 && puck.x < goalX2) {
                    scores.enemy++; resetPuck('enemy');
                } else {
                    puck.y = canvas.height - puck.radius; puck.vy *= -1; let ns = normalizeSpeedWall(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy;
                }
            }

            // Collisions avec les traits
            for (let i = drawnPaths.length - 1; i >= 0; i--) {
                let pathInfo = drawnPaths[i];
                let path = pathInfo.path;
                let collisionDetected = false;
                
                for (let j = 0; j < path.length - 1; j++) {
                    let p1 = path[j]; let p2 = path[j + 1];
                    let abx = p2.x - p1.x; let aby = p2.y - p1.y;
                    let apx = puck.x - p1.x; let apy = puck.y - p1.y;

                    let t = (apx * abx + apy * aby) / (abx * abx + aby * aby);
                    t = Math.max(0, Math.min(1, t)); 

                    let closestX = p1.x + t * abx; let closestY = p1.y + t * aby;
                    let dist = Math.hypot(puck.x - closestX, puck.y - closestY);

                    if (dist < puck.radius + 4) {
                        let nx = (puck.x - closestX) / dist; let ny = (puck.y - closestY) / dist;
                        let dot = puck.vx * nx + puck.vy * ny;
                        
                        if (dot < 0) {
                            puck.vx -= 2 * dot * nx; puck.vy -= 2 * dot * ny;

                            let currentSpeed = Math.hypot(puck.vx, puck.vy);
                            let newSpeed;

                            if (p1.y < canvas.height / 2) {
                                // Zone adverse : On maintient au moins la vitesse minimale (MIN_SPEED)
                                // Pas de "ralentissement" radical, juste l'absence de boost
                                newSpeed = Math.max(MIN_SPEED, currentSpeed * 0.95); 
                            } else {
                                // Notre zone : Gros boost immédiat !
                                newSpeed = Math.max(BOOST_SPEED, currentSpeed * 1.25); 
                            }
                            
                            // Plafond de sécurité pour éviter les bugs
                            newSpeed = Math.min(newSpeed, MAX_SPEED); 

                            let ratio = newSpeed / currentSpeed;
                            puck.vx *= ratio;
                            puck.vy *= ratio;
                            
                            collisionDetected = true;
                            break; 
                        }
                    }
                }
                if (collisionDetected) {
                    drawnPaths.splice(i, 1);
                }
            }

            // UI Cooldown
            let timePassed = now - lastDrawTime;
            if (timePassed < COOLDOWN_TIME) {
                cooldownFill.style.height = (timePassed / COOLDOWN_TIME) * 100 + '%';
                cooldownFill.classList.remove('ready');
                cooldownStatus.innerText = "RECHARGE";
                cooldownStatus.style.backgroundColor = "var(--warning-color)";
            } else {
                cooldownFill.style.height = '100%';
                cooldownFill.classList.add('ready');
                cooldownStatus.innerText = "PRÊT";
                cooldownStatus.style.backgroundColor = "var(--secondary-color)";
            }
        }

        // Fonction stylisée pour dessiner les cages en fausse 3D
        function drawGoal(x, y, width, height, color, isTop) {
            // Fond noir (profondeur)
            ctx.fillStyle = "#151515";
            ctx.fillRect(x, y, width, height);

            // Plancher coloré (légèrement décalé pour l'effet de profondeur)
            let offset = 6;
            let innerY = isTop ? y : y + offset;
            ctx.fillStyle = color;
            ctx.fillRect(x + offset, innerY, width - offset * 2, height - offset);

            // Grille de fond typique du néobrutalisme (hachures)
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#151515";
            ctx.beginPath();
            for (let i = x + 12; i < x + width; i += 15) {
                ctx.moveTo(i, y);
                // Inclinaison de la ligne pour l'effet filet
                ctx.lineTo(i - (isTop ? 12 : -12), y + height);
            }
            ctx.stroke();

            // Bordure extérieure épaisse en U
            ctx.lineWidth = 6;
            ctx.strokeStyle = "#151515";
            ctx.beginPath();
            if (isTop) {
                ctx.moveTo(x, y); ctx.lineTo(x, y + height);
                ctx.lineTo(x + width, y + height); ctx.lineTo(x + width, y);
            } else {
                ctx.moveTo(x, y + height); ctx.lineTo(x, y);
                ctx.lineTo(x + width, y); ctx.lineTo(x + width, y + height);
            }
            ctx.stroke();
        }

        function drawNeoPath(path, innerColor, alpha = 1.0) {
            if (!path || path.length < 2) return;
            ctx.globalAlpha = alpha;
            
            ctx.beginPath();
            ctx.moveTo(path[0].x, path[0].y);
            for(let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
            ctx.strokeStyle = "#151515";
            ctx.lineWidth = 14;
            ctx.lineJoin = "round";
            ctx.lineCap = "round";
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(path[0].x, path[0].y);
            for(let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
            ctx.strokeStyle = innerColor;
            ctx.lineWidth = 6;
            ctx.lineJoin = "round";
            ctx.lineCap = "round";
            ctx.stroke();
            
            ctx.globalAlpha = 1.0;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // LISERÉ INTÉRIEUR (Pour un rendu "Plateau de jeu" moins plat)
            ctx.lineWidth = 6;
            ctx.strokeStyle = "rgba(21, 21, 21, 0.06)";
            ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);

            // CERCLE CENTRAL
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, 60, 0, Math.PI * 2);
            ctx.lineWidth = 6;
            ctx.strokeStyle = "rgba(21, 21, 21, 0.15)";
            ctx.stroke();

            // LIGNE MÉDIANE
            ctx.setLineDash([15, 15]);
            ctx.beginPath();
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.strokeStyle = "rgba(21, 21, 21, 0.25)";
            ctx.lineWidth = 6;
            ctx.stroke();
            ctx.setLineDash([]);

            // CAGES AVEC EFFET DE PROFONDEUR
            drawGoal(goalX1, 0, GOAL_WIDTH, GOAL_DEPTH, COLOR_ENEMY, true);
            drawGoal(goalX1, canvas.height - GOAL_DEPTH, GOAL_WIDTH, GOAL_DEPTH, COLOR_PLAYER, false);

            // DESSIN DES TRAITS
            drawnPaths.forEach(p => {
                let isTopZone = p.path[0].y < canvas.height / 2;
                let color = isTopZone ? COLOR_ENEMY : COLOR_PLAYER;
                drawNeoPath(p.path, color);
            });

            if (currentPath) {
                let isTopZone = currentPath[0].y < canvas.height / 2;
                let color = isTopZone ? COLOR_ENEMY : COLOR_PLAYER;
                drawNeoPath(currentPath, color, 0.5); 
            }

            // LE PALET (Avec détail intérieur)
            ctx.beginPath();
            ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI * 2);
            ctx.fillStyle = COLOR_PUCK;
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#151515";
            ctx.stroke();
            
            // Cercle central du palet pour lui donner du relief
            ctx.beginPath();
            ctx.arc(puck.x, puck.y, puck.radius * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = "#151515";
            ctx.fill();
            ctx.closePath();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
