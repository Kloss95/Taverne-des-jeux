<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw Hockey</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --border-color: #151515;
            --bg-color: #fceea7;
            --box-bg: #ffffff;
            --primary-color: #ff5e5e;
            --secondary-color: #4ade80;
            --warning-color: #ffb703;
            --enemy-color: #a78bfa;
            --goal-color: #38bdf8;
        }

        body { 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: var(--bg-color); 
            background-image: radial-gradient(#15151530 2px, transparent 2px);
            background-size: 24px 24px;
            color: var(--border-color); 
            font-family: 'Fredoka', sans-serif; 
            overflow: hidden; 
        }

        .neo-box {
            background-color: var(--box-bg);
            border: 4px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 6px 6px 0px var(--border-color);
        }

        .header {
            padding: 10px 20px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }

        /* Conteneur principal pour aligner le canvas et l'UI du bas */
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        canvas { 
            background-color: var(--box-bg); 
            cursor: crosshair; 
            display: block;
        }

        /* Zone UI en bas du canvas */
        .bottom-ui {
            width: 100%;
            display: flex;
            justify-content: flex-start;
            margin-top: 15px;
        }

        .cooldown-container {
            width: 250px;
            height: 40px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #cooldown-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background-color: var(--warning-color);
            transition: width 0.1s linear;
            z-index: 1;
        }

        #cooldown-fill.ready {
            background-color: var(--secondary-color);
        }

        .cooldown-text {
            position: relative;
            z-index: 2;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header neo-box">
        <h1>🏒 Draw Hockey</h1>
    </div>

    <div class="game-wrapper">
        <canvas id="gameCanvas" width="500" height="750" class="neo-box"></canvas>
        
        <div class="bottom-ui">
            <div class="cooldown-container neo-box">
                <div id="cooldown-fill" class="ready"></div>
                <span class="cooldown-text" id="cooldown-label">PINCEAU PRÊT</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const cooldownFill = document.getElementById('cooldown-fill');
        const cooldownLabel = document.getElementById('cooldown-label');

        // Constantes du jeu
        const COOLDOWN_TIME = 1000; 
        const TARGET_SPEED = 9; // Vitesse moyenne augmentée
        const GOAL_WIDTH = 160;

        // Variables d'état
        let lastDrawTime = 0;
        let isDrawing = false;
        let currentPath = null;
        let activePath = null; // Un seul trait actif par joueur
        
        let scores = { player: 0, enemy: 0 };
        let puck = { x: 250, y: 500, vx: 7, vy: -9, radius: 14 };

        // Position des cages
        const goalX1 = (canvas.width - GOAL_WIDTH) / 2;
        const goalX2 = goalX1 + GOAL_WIDTH;

        // Événements de dessin (Chemin libre)
        canvas.addEventListener('mousedown', (e) => {
            if (Date.now() - lastDrawTime < COOLDOWN_TIME) return;
            const rect = canvas.getBoundingClientRect();
            isDrawing = true;
            // On écrase le trait précédent dès qu'on commence à dessiner
            activePath = null; 
            currentPath = [{ x: e.clientX - rect.left, y: e.clientY - rect.top }];
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing || !currentPath) return;
            const rect = canvas.getBoundingClientRect();
            let newX = e.clientX - rect.left;
            let newY = e.clientY - rect.top;
            
            // On ajoute un point seulement si on a bougé d'au moins 5 pixels (optimisation)
            let lastPoint = currentPath[currentPath.length - 1];
            if (Math.hypot(newX - lastPoint.x, newY - lastPoint.y) > 5) {
                currentPath.push({ x: newX, y: newY });
            }
        });

        canvas.addEventListener('mouseup', () => {
            if (!isDrawing) return;
            isDrawing = false;
            if (currentPath && currentPath.length > 1) {
                activePath = currentPath; // On valide le trait
                lastDrawTime = Date.now();
            }
            currentPath = null;
        });

        function normalizeSpeed(vx, vy) {
            let speed = Math.hypot(vx, vy);
            let newSpeed = (speed * 0.4) + (TARGET_SPEED * 0.6);
            let ratio = newSpeed / speed;
            return { vx: vx * ratio, vy: vy * ratio };
        }

        function resetPuck(whoScored) {
            // Efface le trait actuel lors d'un but
            activePath = null;
            
            puck.x = canvas.width / 2;
            puck.vx = (Math.random() > 0.5 ? 2 : -2); // Légère déviation aléatoire

            if (whoScored === 'enemy') {
                // L'ennemi a marqué (dans notre but en bas)
                // Le palet revient au centre de notre terrain et descend vers nous
                puck.y = canvas.height * 0.75;
                puck.vy = 4; // Lentement vers le bas
            } else {
                // On a marqué (dans le but ennemi en haut)
                // Le palet revient au centre de son terrain et monte vers lui
                puck.y = canvas.height * 0.25;
                puck.vy = -4; // Lentement vers le haut
            }
        }

        function update() {
            puck.x += puck.vx;
            puck.y += puck.vy;

            // Murs latéraux (gauche et droite)
            if (puck.x - puck.radius < 0) { puck.x = puck.radius; puck.vx *= -1; let ns = normalizeSpeed(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }
            if (puck.x + puck.radius > canvas.width) { puck.x = canvas.width - puck.radius; puck.vx *= -1; let ns = normalizeSpeed(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }
            
            // Mur du Haut (But ennemi)
            if (puck.y - puck.radius < 0) { 
                if (puck.x > goalX1 && puck.x < goalX2) {
                    scores.player++;
                    resetPuck('player');
                } else {
                    puck.y = puck.radius; puck.vy *= -1; let ns = normalizeSpeed(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy;
                }
            }

            // Mur du Bas (Notre but)
            if (puck.y + puck.radius > canvas.height) { 
                if (puck.x > goalX1 && puck.x < goalX2) {
                    scores.enemy++;
                    resetPuck('enemy');
                } else {
                    puck.y = canvas.height - puck.radius; puck.vy *= -1; let ns = normalizeSpeed(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy;
                }
            }

            // Collisions avec le trait libre (activePath)
            if (activePath && activePath.length > 1) {
                let collisionDetected = false;
                
                // On vérifie chaque segment du tracé
                for (let i = 0; i < activePath.length - 1; i++) {
                    let p1 = activePath[i];
                    let p2 = activePath[i + 1];

                    let abx = p2.x - p1.x; let aby = p2.y - p1.y;
                    let apx = puck.x - p1.x; let apy = puck.y - p1.y;

                    let t = (apx * abx + apy * aby) / (abx * abx + aby * aby);
                    t = Math.max(0, Math.min(1, t)); 

                    let closestX = p1.x + t * abx; let closestY = p1.y + t * aby;
                    let dist = Math.hypot(puck.x - closestX, puck.y - closestY);

                    if (dist < puck.radius + 4) {
                        let nx = (puck.x - closestX) / dist; let ny = (puck.y - closestY) / dist;
                        let dot = puck.vx * nx + puck.vy * ny;
                        
                        if (dot < 0) {
                            puck.vx -= 2 * dot * nx;
                            puck.vy -= 2 * dot * ny;

                            // Vérification de la zone où le rebond a lieu
                            if (p1.y < canvas.height / 2) {
                                puck.vx *= 0.85; puck.vy *= 0.85; // Malus zone adverse
                            } else {
                                puck.vx *= 1.3; puck.vy *= 1.3; // Boost notre zone
                            }

                            collisionDetected = true;
                            break; // On arrête la boucle pour ne rebondir qu'une fois
                        }
                    }
                }

                // Si le palet touche le trait, le trait disparaît
                if (collisionDetected) {
                    activePath = null;
                }
            }

            // UI Cooldown
            let timePassed = Date.now() - lastDrawTime;
            if (timePassed < COOLDOWN_TIME) {
                cooldownFill.style.width = (timePassed / COOLDOWN_TIME) * 100 + '%';
                cooldownFill.classList.remove('ready');
                cooldownLabel.innerText = "RECHARGE...";
            } else {
                cooldownFill.style.width = '100%';
                cooldownFill.classList.add('ready');
                cooldownLabel.innerText = "PINCEAU PRÊT";
            }
        }

        function drawNeoPath(path, innerColor) {
            if (!path || path.length < 2) return;
            
            // Contour noir
            ctx.beginPath();
            ctx.moveTo(path[0].x, path[0].y);
            for(let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
            ctx.strokeStyle = "#151515";
            ctx.lineWidth = 14;
            ctx.lineJoin = "round";
            ctx.lineCap = "round";
            ctx.stroke();

            // Intérieur coloré
            ctx.beginPath();
            ctx.moveTo(path[0].x, path[0].y);
            for(let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
            ctx.strokeStyle = innerColor;
            ctx.lineWidth = 6;
            ctx.lineJoin = "round";
            ctx.lineCap = "round";
            ctx.stroke();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dessin des Cages (Buts)
            ctx.fillStyle = "var(--goal-color)";
            ctx.fillRect(goalX1, 0, GOAL_WIDTH, 15); // But ennemi
            ctx.fillRect(goalX1, canvas.height - 15, GOAL_WIDTH, 15); // Notre but
            
            // Ligne médiane
            ctx.setLineDash([15, 15]);
            ctx.beginPath();
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.strokeStyle = "#151515";
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.setLineDash([]);

            // Affichage des Scores au centre
            ctx.fillStyle = "rgba(21, 21, 21, 0.08)";
            ctx.font = "bold 100px Fredoka";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(scores.enemy, canvas.width / 2, canvas.height / 4);
            ctx.fillText(scores.player, canvas.width / 2, canvas.height * 0.75);
            ctx.textBaseline = "alphabetic";

            // Dessin du trait validé
            if (activePath) {
                let isTopZone = activePath[0].y < canvas.height / 2;
                let color = isTopZone ? "var(--enemy-color)" : "var(--secondary-color)";
                drawNeoPath(activePath, color);
            }

            // Dessin du trait en cours (semi-transparent)
            if (currentPath) {
                ctx.globalAlpha = 0.5;
                let isTopZone = currentPath[0].y < canvas.height / 2;
                let color = isTopZone ? "var(--enemy-color)" : "var(--secondary-color)";
                drawNeoPath(currentPath, color);
                ctx.globalAlpha = 1.0;
            }

            // Dessiner le palet
            ctx.beginPath();
            ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI * 2);
            ctx.fillStyle = "var(--primary-color)";
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#151515";
            ctx.stroke();
            ctx.closePath();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
