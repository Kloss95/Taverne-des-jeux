<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw Hockey</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script> 
    <style>
        :root {
            --border-color: #151515;
            --bg-color: #fceea7;
            --canvas-bg: #e2e8f0; 
            --primary-color: #ff5e5e;
            --secondary-color: #4ade80; 
            --warning-color: #F0C300; 
            --enemy-color: #a78bfa;   
            --fill-pct: 100%;
        }

        body { 
            margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            min-height: 100vh; background-color: var(--bg-color); 
            background-image: radial-gradient(#15151530 2px, transparent 2px);
            background-size: 24px 24px; color: var(--border-color); font-family: 'Fredoka', sans-serif; 
            overflow-x: hidden; padding: 10px; box-sizing: border-box;
        }

        .neo-box {
            background-color: #ffffff; border: 4px solid var(--border-color);
            border-radius: 12px; box-shadow: 4px 4px 0px var(--border-color);
        }

        /* LOBBY SCREEN */
        #lobby-screen {
            padding: 40px; text-align: center; width: 100%; max-width: 500px;
            display: flex; flex-direction: column; gap: 20px; box-sizing: border-box;
        }
        #lobby-screen h1 { font-size: 32px; margin: 0; text-transform: uppercase; }
        #lobby-screen p { font-size: 16px; margin: 0; font-weight: 600; }
        
        .lobby-input {
            width: 100%; padding: 15px; font-size: 16px; font-weight: 700;
            font-family: 'Fredoka', sans-serif; text-align: center;
            border: 4px solid var(--border-color); border-radius: 8px; box-sizing: border-box;
        }
        .lobby-btn {
            width: 100%; padding: 15px; font-size: 18px; font-weight: 700; text-transform: uppercase;
            font-family: 'Fredoka', sans-serif; cursor: pointer;
            border: 4px solid var(--border-color); border-radius: 8px;
            box-shadow: 4px 4px 0px var(--border-color); transition: transform 0.1s;
        }
        .lobby-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px var(--border-color); }
        .btn-yellow { background-color: #ffd64f; }
        .btn-blue { background-color: #3b82f6; color: white; }
        
        .join-row { display: flex; gap: 10px; }

        /* GAME SCREEN */
        #game-screen { display: none; flex-direction: column; align-items: center; width: 100%; }
        
        .header-game { background-color: #ffffff; padding: 10px 20px; margin-bottom: 20px; text-transform: uppercase; }
        .header-game h2 { margin: 0; font-size: 22px; }

        .game-container { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 20px; width: 100%; max-width: 1000px; position: relative; }
        .panel-gauche { order: 1; display: flex; flex-direction: column; align-items: center; gap: 15px; width: 140px; }
        .panel-centre { order: 2; display: flex; justify-content: center; width: 100%; max-width: 500px; position: relative; }
        .panel-droit  { order: 3; display: flex; flex-direction: column; align-items: center; gap: 15px; width: 140px; }

        canvas { width: 100%; height: auto; aspect-ratio: 2 / 3; cursor: crosshair; display: block; touch-action: none; background-color: var(--canvas-bg); }

        .cooldown-wrapper { width: 40px; height: 300px; background-color: #ffffff; position: relative; overflow: hidden; border-radius: 8px; }
        #cooldown-fill { position: absolute; bottom: 0; left: 0; width: 100%; height: var(--fill-pct); background-color: var(--warning-color); transition: height 0.1s linear, width 0.1s linear, background-color 0.2s; }
        #cooldown-fill.ready { background-color: var(--secondary-color); }
        .cooldown-status { width: 100%; padding: 10px 0; text-align: center; font-size: 14px; font-weight: 700; background-color: #ffffff; }

        .score-box { background-color: #ffffff; width: 100%; padding: 10px; text-align: center; display: flex; flex-direction: column; gap: 5px; box-sizing: border-box; }
        .score-title { font-size: 14px; font-weight: 700; padding: 5px; border-radius: 6px; border: 3px solid var(--border-color); }
        .score-value { font-size: 48px; font-weight: 700; line-height: 1; }

        /* OVERLAYS */
        #countdown-overlay, #game-over-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(21, 21, 21, 0.8); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10; border-radius: 8px;
        }
        #countdown-number { font-size: 120px; color: white; text-shadow: 4px 4px 0px var(--border-color); }
        .game-over-text { font-size: 40px; color: white; margin-bottom: 20px; text-align: center; }

        @media (max-width: 768px) {
            .game-container { flex-direction: column; gap: 15px; }
            .panel-droit { order: 1; flex-direction: row; width: 100%; max-width: 500px; justify-content: space-between; }
            .panel-centre { order: 2; }
            .panel-gauche { order: 3; flex-direction: row; width: 100%; max-width: 500px; }
            .cooldown-wrapper { width: 100%; height: 40px; }
            #cooldown-fill { bottom: 0; left: 0; height: 100%; width: var(--fill-pct); }
            .cooldown-status { width: 120px; }
        }
    </style>
</head>
<body>

    <div id="lobby-screen" class="neo-box">
        <h1>Draw Hockey</h1>
        <p>Prêt à affronter tes amis ?</p>
        
        <input type="text" id="username" class="lobby-input" placeholder="TON PSEUDO">
        <button class="lobby-btn btn-yellow" onclick="createRoom()">CRÉER UN SALON PRIVÉ</button>
        
        <p>OU</p>
        
        <div class="join-row">
            <input type="text" id="room-code-input" class="lobby-input" placeholder="CODE">
            <button class="lobby-btn btn-blue" onclick="joinRoom()">REJOINDRE</button>
        </div>
        <p id="lobby-msg" style="color: red; display: none;"></p>
    </div>

    <div id="game-screen">
        <div class="header-game neo-box">
            <h2><span id="display-room-code"></span></h2>
        </div>

        <div class="game-container">
            <div class="panel-gauche">
                <div class="cooldown-wrapper neo-box"><div id="cooldown-fill" class="ready"></div></div>
                <div class="cooldown-status neo-box" id="cooldown-status">PRÊT</div>
            </div>

            <div class="panel-centre">
                <canvas id="gameCanvas" width="500" height="750" class="neo-box"></canvas>
                
                <div id="countdown-overlay"><div id="countdown-number">3</div></div>
                
                <div id="game-over-overlay">
                    <div class="game-over-text" id="winner-text">Gagné !</div>
                    <button class="lobby-btn btn-yellow" style="width: 200px;" onclick="playAgain()">REJOUER</button>
                </div>
            </div>
            
            <div class="panel-droit">
                <div class="score-box neo-box">
                    <div class="score-title" id="title-enemy">ADVERSAIRE</div>
                    <div class="score-value" id="score-enemy">0</div>
                </div>
                <div class="score-box neo-box">
                    <div class="score-title" id="title-player">TOI</div>
                    <div class="score-value" id="score-player">0</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io(); 
        
        const lobbyScreen = document.getElementById('lobby-screen');
        const gameScreen = document.getElementById('game-screen');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const gameOverOverlay = document.getElementById('game-over-overlay');
        const countdownNumber = document.getElementById('countdown-number');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let myRoomCode = '';
        let myRole = ''; 
        let gameActive = false;
        
        const COOLDOWN_TIME = 1000; const LIFESPAN = 1000; 
        const MIN_SPEED = 9; const BOOST_SPEED = 14; const MAX_SPEED = 22;  
        const GOAL_WIDTH = 140; 
        const COLOR_HOST = "#4ade80"; 
        const COLOR_CLIENT = "#a78bfa"; 
        const COLOR_PUCK = "#ff5e5e";

        let lastDrawTime = 0; let isDrawing = false; let currentPath = null;
        let drawnPaths = []; 
        let scores = { host: 0, client: 0 };
        let puck = { x: 250, y: 375, vx: 0, vy: 0, radius: 14 };

        const goalX1 = (canvas.width - GOAL_WIDTH) / 2; const goalX2 = goalX1 + GOAL_WIDTH;

        function createRoom() {
            const user = document.getElementById('username').value;
            socket.emit('hockey_createRoom', user);
        }

        function joinRoom() {
            const user = document.getElementById('username').value;
            const code = document.getElementById('room-code-input').value;
            socket.emit('hockey_joinRoom', { code, username: user });
        }

        socket.on('hockey_roomCreated', (code) => {
            myRoomCode = code; myRole = 'host';
            document.getElementById('display-room-code').innerText = "Code : " + code;
            setupColors(); lobbyScreen.style.display = 'none'; gameScreen.style.display = 'flex';
        });

        socket.on('hockey_error', (msg) => {
            const msgEl = document.getElementById('lobby-msg');
            msgEl.innerText = msg; msgEl.style.display = 'block';
        });

        function setupColors() {
            if (myRole === 'host') {
                document.getElementById('title-player').style.backgroundColor = COLOR_HOST;
                document.getElementById('title-enemy').style.backgroundColor = COLOR_CLIENT;
            } else {
                document.getElementById('title-player').style.backgroundColor = COLOR_CLIENT;
                document.getElementById('title-enemy').style.backgroundColor = COLOR_HOST;
            }
        }

        socket.on('hockey_startCountdown', (data) => {
            if (!myRole) {
                myRoomCode = data.roomCode; myRole = data.hostId === socket.id ? 'host' : 'client';
                document.getElementById('display-room-code').innerText = "Code : " + myRoomCode;
                setupColors(); lobbyScreen.style.display = 'none'; gameScreen.style.display = 'flex';
            }
            
            gameOverOverlay.style.display = 'none'; countdownOverlay.style.display = 'flex';
            drawnPaths = []; scores = { host: 0, client: 0 }; updateScoreUI();
            
            puck.x = 250; puck.y = 375; puck.vx = 0; puck.vy = 0;

            let count = 3; countdownNumber.innerText = count;
            let interval = setInterval(() => {
                count--;
                if (count > 0) countdownNumber.innerText = count;
                else if (count === 0) countdownNumber.innerText = "GO!";
                else { clearInterval(interval); countdownOverlay.style.display = 'none'; }
            }, 1000);
        });

        socket.on('hockey_gameStart', () => {
            gameActive = true;
            if (myRole === 'host') {
                puck.vy = Math.random() > 0.5 ? 4 : -4;
                puck.vx = Math.random() > 0.5 ? 2 : -2;
            }
        });

        function playAgain() {
            gameOverOverlay.querySelector('button').innerText = "ATTENTE...";
            socket.emit('hockey_playAgain', myRoomCode);
        }

        socket.on('hockey_gameOver', (winnerRole) => {
            gameActive = false; gameOverOverlay.style.display = 'flex';
            gameOverOverlay.querySelector('button').innerText = "REJOUER";
            if (winnerRole === myRole) {
                document.getElementById('winner-text').innerText = "VICTOIRE !";
                document.getElementById('winner-text').style.color = "var(--secondary-color)";
            } else {
                document.getElementById('winner-text').innerText = "DÉFAITE...";
                document.getElementById('winner-text').style.color = "var(--primary-color)";
            }
        });

        socket.on('hockey_playerDisconnected', () => { alert("L'adversaire a quitté la partie."); location.reload(); });


        // ==========================================
        // 🔄 INVERSION DES CONTRÔLES POUR LE CLIENT
        // ==========================================
        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width; const scaleY = canvas.height / rect.height;
            let clientX = e.clientX; let clientY = e.clientY;
            if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
            
            let x = (clientX - rect.left) * scaleX; 
            let y = (clientY - rect.top) * scaleY;

            // ASTUCE MAGIQUE : On inverse le clic du client pour que ça corresponde à sa caméra !
            if (myRole === 'client') {
                x = canvas.width - x;
                y = canvas.height - y;
            }

            return { x, y };
        }

        function startDraw(pos) {
            if (!gameActive || Date.now() - lastDrawTime < COOLDOWN_TIME) return;
            isDrawing = true;
            currentPath = [{ x: Math.max(0, Math.min(canvas.width, pos.x)), y: Math.max(0, Math.min(canvas.height, pos.y)) }];
        }

        function moveDraw(pos) {
            if (!isDrawing || !currentPath) return;
            let x = Math.max(0, Math.min(canvas.width, pos.x)); let y = Math.max(0, Math.min(canvas.height, pos.y));
            if (Math.hypot(x - currentPath[currentPath.length - 1].x, y - currentPath[currentPath.length - 1].y) > 5) {
                currentPath.push({ x, y });
            }
        }

        function endDraw() {
            if (!isDrawing) return;
            isDrawing = false;
            if (currentPath && currentPath.length > 1) {
                let pathInfo = { path: currentPath, timestamp: Date.now(), owner: myRole };
                drawnPaths.push(pathInfo);
                socket.emit('hockey_drawLine', { roomCode: myRoomCode, pathInfo }); 
                lastDrawTime = Date.now();
            }
            currentPath = null;
        }

        socket.on('hockey_newLine', (pathInfo) => {
            pathInfo.timestamp = Date.now(); 
            drawnPaths.push(pathInfo);
        });

        canvas.addEventListener('mousedown', (e) => startDraw(getPointerPos(e)));
        window.addEventListener('mousemove', (e) => { if(isDrawing) moveDraw(getPointerPos(e)); });
        window.addEventListener('mouseup', endDraw);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(getPointerPos(e)); }, { passive: false });
        window.addEventListener('touchmove', (e) => { if(isDrawing) moveDraw(getPointerPos(e)); }, { passive: false });
        window.addEventListener('touchend', endDraw);


        function normalizeSpeedWall(vx, vy) {
            let speed = Math.hypot(vx, vy); let newSpeed = Math.max(MIN_SPEED, speed * 0.9);
            return { vx: vx * (newSpeed / speed), vy: vy * (newSpeed / speed) };
        }

        // ==========================================
        // CORRECTION : SENS DE LA BALLE APRÈS UN BUT
        // ==========================================
        function resetPuck(whoScored) {
            puck.x = canvas.width / 2; puck.y = canvas.height / 2;
            puck.vx = (Math.random() > 0.5 ? 2 : -2);
            
            // Si l'hôte marque, la balle va vers le client (-Y). Si le client marque, vers l'hôte (+Y)
            puck.vy = (whoScored === 'host') ? -2 : 2; 
            drawnPaths = []; 
        }

        function updateScoreUI() {
            if (myRole === 'host') {
                document.getElementById('score-player').innerText = scores.host;
                document.getElementById('score-enemy').innerText = scores.client;
            } else {
                document.getElementById('score-player').innerText = scores.client;
                document.getElementById('score-enemy').innerText = scores.host;
            }
        }

        socket.on('hockey_updateScore', (newScores) => { scores = newScores; updateScoreUI(); drawnPaths = []; });
        socket.on('hockey_updatePuck', (serverPuck) => { if (myRole === 'client') puck = serverPuck; });

        function update() {
            let now = Date.now();
            drawnPaths = drawnPaths.filter(p => now - p.timestamp < LIFESPAN);

            let timePassed = now - lastDrawTime;
            const cooldownFill = document.getElementById('cooldown-fill');
            const cooldownStatus = document.getElementById('cooldown-status');
            if (timePassed < COOLDOWN_TIME) {
                document.documentElement.style.setProperty('--fill-pct', (timePassed / COOLDOWN_TIME) * 100 + '%');
                cooldownFill.classList.remove('ready'); cooldownStatus.innerText = "RECHARGE";
            } else {
                document.documentElement.style.setProperty('--fill-pct', '100%');
                cooldownFill.classList.add('ready'); cooldownStatus.innerText = "PRÊT";
            }

            if (!gameActive) return;

            if (myRole === 'host') {
                puck.x += puck.vx; puck.y += puck.vy;

                if (puck.x - puck.radius < 0) { puck.x = puck.radius; puck.vx *= -1; let ns = normalizeSpeedWall(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }
                if (puck.x + puck.radius > canvas.width) { puck.x = canvas.width - puck.radius; puck.vx *= -1; let ns = normalizeSpeedWall(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }
                
                if (puck.y - puck.radius < 0) { 
                    if (puck.x > goalX1 && puck.x < goalX2) { scores.host++; socket.emit('hockey_goalScored', { roomCode: myRoomCode, scores }); resetPuck('host'); } 
                    else { puck.y = puck.radius; puck.vy *= -1; let ns = normalizeSpeedWall(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }
                }
                if (puck.y + puck.radius > canvas.height) { 
                    if (puck.x > goalX1 && puck.x < goalX2) { scores.client++; socket.emit('hockey_goalScored', { roomCode: myRoomCode, scores }); resetPuck('client'); } 
                    else { puck.y = canvas.height - puck.radius; puck.vy *= -1; let ns = normalizeSpeedWall(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }
                }

                for (let i = drawnPaths.length - 1; i >= 0; i--) {
                    let path = drawnPaths[i].path; let collisionDetected = false;
                    for (let j = 0; j < path.length - 1; j++) {
                        let p1 = path[j]; let p2 = path[j + 1];
                        let abx = p2.x - p1.x; let aby = p2.y - p1.y; let apx = puck.x - p1.x; let apy = puck.y - p1.y;
                        let t = Math.max(0, Math.min(1, (apx * abx + apy * aby) / (abx * abx + aby * aby))); 
                        let closestX = p1.x + t * abx; let closestY = p1.y + t * aby;
                        let dist = Math.hypot(puck.x - closestX, puck.y - closestY);

                        if (dist < puck.radius + 4) {
                            let nx = (puck.x - closestX) / dist; let ny = (puck.y - closestY) / dist;
                            let dot = puck.vx * nx + puck.vy * ny;
                            if (dot < 0) {
                                puck.vx -= 2 * dot * nx; puck.vy -= 2 * dot * ny;
                                let currentSpeed = Math.hypot(puck.vx, puck.vy);
                                let newSpeed = (p1.y < canvas.height / 2) ? Math.max(MIN_SPEED, currentSpeed * 0.95) : Math.max(BOOST_SPEED, currentSpeed * 1.25); 
                                newSpeed = Math.min(newSpeed, MAX_SPEED); 
                                puck.vx *= newSpeed / currentSpeed; puck.vy *= newSpeed / currentSpeed;
                                collisionDetected = true; break; 
                            }
                        }
                    }
                    if (collisionDetected) drawnPaths.splice(i, 1);
                }
                socket.emit('hockey_syncPuck', { roomCode: myRoomCode, puck });
            }
        }

        function drawNeoPath(path, ownerColor, alpha = 1.0) {
            if (!path || path.length < 2) return;
            ctx.globalAlpha = alpha;
            ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y); for(let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
            ctx.strokeStyle = "#151515"; ctx.lineWidth = 14; ctx.lineJoin = "round"; ctx.lineCap = "round"; ctx.stroke();
            ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y); for(let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
            ctx.strokeStyle = ownerColor; ctx.lineWidth = 6; ctx.lineJoin = "round"; ctx.lineCap = "round"; ctx.stroke();
            ctx.globalAlpha = 1.0;
        }

        // ==========================================
        // 🔄 ROTATION DE LA CAMÉRA POUR LE CLIENT
        // ==========================================
        function draw() {
            if (!myRole) return; 
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ASTUCE MAGIQUE : On retourne complètement le Canvas pour le Joueur 2
            ctx.save();
            if (myRole === 'client') {
                ctx.translate(canvas.width, canvas.height);
                ctx.rotate(Math.PI); // 180 degrés
            }

            // A partir d'ici on dessine normalement, le Canvas gère l'illusion !
            ctx.lineWidth = 4; ctx.strokeStyle = "#151515";
            ctx.beginPath(); ctx.arc(canvas.width / 2, 0, 90, 0, Math.PI); ctx.fillStyle = "rgba(167, 139, 250, 0.25)"; ctx.fill(); ctx.stroke(); 
            ctx.beginPath(); ctx.arc(canvas.width / 2, canvas.height, 90, Math.PI, 0); ctx.fillStyle = "rgba(74, 222, 128, 0.25)"; ctx.fill(); ctx.stroke(); 

            ctx.beginPath(); ctx.arc(canvas.width / 2, canvas.height / 2, 60, 0, Math.PI * 2); ctx.lineWidth = 6; ctx.strokeStyle = "rgba(21, 21, 21, 0.15)"; ctx.stroke();
            ctx.setLineDash([15, 15]); ctx.beginPath(); ctx.moveTo(0, canvas.height / 2); ctx.lineTo(canvas.width, canvas.height / 2); ctx.strokeStyle = "rgba(21, 21, 21, 0.25)"; ctx.lineWidth = 6; ctx.stroke(); ctx.setLineDash([]);

            ctx.lineWidth = 6; ctx.strokeStyle = "#151515";
            ctx.fillStyle = COLOR_CLIENT; ctx.fillRect(goalX1, 0, GOAL_WIDTH, 15); ctx.strokeRect(goalX1, -3, GOAL_WIDTH, 18);
            ctx.fillStyle = COLOR_HOST; ctx.fillRect(goalX1, canvas.height - 15, GOAL_WIDTH, 15); ctx.strokeRect(goalX1, canvas.height - 15, GOAL_WIDTH, 18);

            drawnPaths.forEach(p => drawNeoPath(p.path, p.owner === 'host' ? COLOR_HOST : COLOR_CLIENT));
            if (currentPath) drawNeoPath(currentPath, myRole === 'host' ? COLOR_HOST : COLOR_CLIENT, 0.5);

            ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI * 2); ctx.fillStyle = COLOR_PUCK; ctx.fill(); ctx.lineWidth = 4; ctx.strokeStyle = "#151515"; ctx.stroke();
            ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.radius * 0.4, 0, Math.PI * 2); ctx.fillStyle = "#151515"; ctx.fill(); ctx.closePath();

            // Fin de la rotation (Pour que ça ne bugge pas au frame suivant)
            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
