<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw Hockey</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --border-color: #151515;
            --bg-color: #fceea7;
            --canvas-bg: #e2e8f0; /* Gris/bleu très doux pour reposer les yeux */
            --primary-color: #ff5e5e;
            --secondary-color: #4ade80; /* Vert (Joueur) */
            --warning-color: #ffb703;
            --enemy-color: #a78bfa;   /* Violet (Adversaire) */
        }

        body { 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: var(--bg-color); 
            background-image: radial-gradient(#15151530 2px, transparent 2px);
            background-size: 24px 24px;
            color: var(--border-color); 
            font-family: 'Fredoka', sans-serif; 
            overflow: hidden; 
        }

        .neo-box {
            background-color: var(--canvas-bg);
            border: 4px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 6px 6px 0px var(--border-color);
        }

        .header {
            background-color: #ffffff;
            padding: 10px 20px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }

        /* Le conteneur relatif permet d'ancrer la jauge par rapport au terrain */
        .game-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
        }

        canvas { 
            cursor: crosshair; 
            display: block;
        }

        /* Positionnement exact selon ton schéma : en bas à gauche */
        .cooldown-container {
            position: absolute;
            left: -230px; /* Décalé sur la gauche */
            bottom: 0px;  /* Aligné avec le bas du canvas */
            width: 200px;
            height: 40px;
            background-color: #ffffff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 4px 4px 0px var(--border-color);
        }

        #cooldown-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background-color: var(--warning-color);
            transition: width 0.1s linear;
            z-index: 1;
        }

        #cooldown-fill.ready {
            background-color: var(--secondary-color);
        }

        .cooldown-text {
            position: relative;
            z-index: 2;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header neo-box">
        <h1>🏒 Draw Hockey</h1>
    </div>

    <div class="game-wrapper">
        <canvas id="gameCanvas" width="500" height="750" class="neo-box"></canvas>
        
        <div class="cooldown-container">
            <div id="cooldown-fill" class="ready"></div>
            <span class="cooldown-text" id="cooldown-label">PINCEAU PRÊT</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const cooldownFill = document.getElementById('cooldown-fill');
        const cooldownLabel = document.getElementById('cooldown-label');

        // Constantes
        const COOLDOWN_TIME = 1000; // 1 seconde de recharge
        const LIFESPAN = 1000; // Le trait disparait au bout d'1 seconde
        const TARGET_SPEED = 9; 
        const GOAL_WIDTH = 180; // Cages légèrement agrandies

        // Variables d'état
        let lastDrawTime = 0;
        let isDrawing = false;
        let currentPath = null;
        let drawnPaths = []; // Stocke tous les traits valides avec leur timestamp
        
        let scores = { player: 0, enemy: 0 };
        let puck = { x: 250, y: 500, vx: 7, vy: -9, radius: 14 };

        const goalX1 = (canvas.width - GOAL_WIDTH) / 2;
        const goalX2 = goalX1 + GOAL_WIDTH;

        // Fonction pour démarrer le trait
        function startDraw(x, y) {
            if (Date.now() - lastDrawTime < COOLDOWN_TIME) return;
            isDrawing = true;
            // On s'assure que le point de départ est dans le canvas
            x = Math.max(0, Math.min(canvas.width, x));
            y = Math.max(0, Math.min(canvas.height, y));
            currentPath = [{ x, y }];
        }

        // Fonction pour continuer le trait (avec bridage aux bords du terrain)
        function moveDraw(x, y) {
            if (!isDrawing || !currentPath) return;
            
            // "Clamping" : empêche le trait de sortir visuellement du canvas
            x = Math.max(0, Math.min(canvas.width, x));
            y = Math.max(0, Math.min(canvas.height, y));

            let lastPoint = currentPath[currentPath.length - 1];
            if (Math.hypot(x - lastPoint.x, y - lastPoint.y) > 5) {
                currentPath.push({ x, y });
            }
        }

        // Fonction pour terminer et sauvegarder le trait
        function endDraw() {
            if (!isDrawing) return;
            isDrawing = false;
            if (currentPath && currentPath.length > 1) {
                drawnPaths.push({ path: currentPath, timestamp: Date.now() });
                lastDrawTime = Date.now();
            }
            currentPath = null;
        }

        // Événements Souris (Le mouseup et mousemove sont sur WINDOW pour ne pas perdre le trait !)
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            startDraw(e.clientX - rect.left, e.clientY - rect.top);
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            moveDraw(e.clientX - rect.left, e.clientY - rect.top);
        });
        window.addEventListener('mouseup', endDraw);

        // Événements Tactiles (Smartphones / Tablettes)
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            startDraw(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
        }, { passive: false });
        window.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            moveDraw(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
        }, { passive: false });
        window.addEventListener('touchend', endDraw);


        function normalizeSpeed(vx, vy) {
            let speed = Math.hypot(vx, vy);
            let newSpeed = (speed * 0.4) + (TARGET_SPEED * 0.6);
            let ratio = newSpeed / speed;
            return { vx: vx * ratio, vy: vy * ratio };
        }

        function resetPuck(whoScored) {
            puck.x = canvas.width / 2;
            puck.vx = (Math.random() > 0.5 ? 2 : -2);
            
            // Efface les traits lors d'un but
            drawnPaths = []; 

            if (whoScored === 'enemy') {
                puck.y = canvas.height * 0.75;
                puck.vy = 4; 
            } else {
                puck.y = canvas.height * 0.25;
                puck.vy = -4; 
            }
        }

        function update() {
            let now = Date.now();

            // 1. Nettoyage des traits vieux de plus d'1 seconde
            drawnPaths = drawnPaths.filter(p => now - p.timestamp < LIFESPAN);

            puck.x += puck.vx;
            puck.y += puck.vy;

            // Murs latéraux
            if (puck.x - puck.radius < 0) { puck.x = puck.radius; puck.vx *= -1; let ns = normalizeSpeed(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }
            if (puck.x + puck.radius > canvas.width) { puck.x = canvas.width - puck.radius; puck.vx *= -1; let ns = normalizeSpeed(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy; }
            
            // Mur Haut (Cage ennemi)
            if (puck.y - puck.radius < 0) { 
                if (puck.x > goalX1 && puck.x < goalX2) {
                    scores.player++; resetPuck('player');
                } else {
                    puck.y = puck.radius; puck.vy *= -1; let ns = normalizeSpeed(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy;
                }
            }

            // Mur Bas (Notre Cage)
            if (puck.y + puck.radius > canvas.height) { 
                if (puck.x > goalX1 && puck.x < goalX2) {
                    scores.enemy++; resetPuck('enemy');
                } else {
                    puck.y = canvas.height - puck.radius; puck.vy *= -1; let ns = normalizeSpeed(puck.vx, puck.vy); puck.vx = ns.vx; puck.vy = ns.vy;
                }
            }

            // Collisions avec les traits
            for (let i = drawnPaths.length - 1; i >= 0; i--) {
                let pathInfo = drawnPaths[i];
                let path = pathInfo.path;
                let collisionDetected = false;
                
                for (let j = 0; j < path.length - 1; j++) {
                    let p1 = path[j]; let p2 = path[j + 1];
                    let abx = p2.x - p1.x; let aby = p2.y - p1.y;
                    let apx = puck.x - p1.x; let apy = puck.y - p1.y;

                    let t = (apx * abx + apy * aby) / (abx * abx + aby * aby);
                    t = Math.max(0, Math.min(1, t)); 

                    let closestX = p1.x + t * abx; let closestY = p1.y + t * aby;
                    let dist = Math.hypot(puck.x - closestX, puck.y - closestY);

                    if (dist < puck.radius + 4) {
                        let nx = (puck.x - closestX) / dist; let ny = (puck.y - closestY) / dist;
                        let dot = puck.vx * nx + puck.vy * ny;
                        
                        if (dot < 0) {
                            puck.vx -= 2 * dot * nx; puck.vy -= 2 * dot * ny;

                            if (p1.y < canvas.height / 2) {
                                puck.vx *= 0.85; puck.vy *= 0.85; 
                            } else {
                                puck.vx *= 1.3; puck.vy *= 1.3; 
                            }
                            collisionDetected = true;
                            break; 
                        }
                    }
                }
                // Si le palet touche le trait, le trait est détruit
                if (collisionDetected) {
                    drawnPaths.splice(i, 1);
                }
            }

            // UI Cooldown
            let timePassed = now - lastDrawTime;
            if (timePassed < COOLDOWN_TIME) {
                cooldownFill.style.width = (timePassed / COOLDOWN_TIME) * 100 + '%';
                cooldownFill.classList.remove('ready');
                cooldownLabel.innerText = "RECHARGE...";
            } else {
                cooldownFill.style.width = '100%';
                cooldownFill.classList.add('ready');
                cooldownLabel.innerText = "PINCEAU PRÊT";
            }
        }

        function drawNeoPath(path, innerColor, alpha = 1.0) {
            if (!path || path.length < 2) return;
            ctx.globalAlpha = alpha;
            
            ctx.beginPath();
            ctx.moveTo(path[0].x, path[0].y);
            for(let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
            ctx.strokeStyle = "#151515";
            ctx.lineWidth = 14;
            ctx.lineJoin = "round";
            ctx.lineCap = "round";
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(path[0].x, path[0].y);
            for(let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
            ctx.strokeStyle = innerColor;
            ctx.lineWidth = 6;
            ctx.lineJoin = "round";
            ctx.lineCap = "round";
            ctx.stroke();
            
            ctx.globalAlpha = 1.0;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // --- DESSIN DES SCORES ---
            // On les dessine en arrière plan mais très visibles (Bordure blanche épaisse + Remplissage noir)
            ctx.font = "bold 140px Fredoka";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.lineWidth = 10;
            ctx.strokeStyle = "#ffffff";
            
            // Score Ennemi
            ctx.strokeText(scores.enemy, canvas.width / 2, canvas.height * 0.25);
            ctx.fillStyle = "#151515";
            ctx.fillText(scores.enemy, canvas.width / 2, canvas.height * 0.25);
            
            // Score Joueur
            ctx.strokeText(scores.player, canvas.width / 2, canvas.height * 0.75);
            ctx.fillStyle = "#151515";
            ctx.fillText(scores.player, canvas.width / 2, canvas.height * 0.75);
            ctx.textBaseline = "alphabetic"; // reset

            // --- LIGNE MÉDIANE ---
            ctx.setLineDash([15, 15]);
            ctx.beginPath();
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.strokeStyle = "rgba(21, 21, 21, 0.4)";
            ctx.lineWidth = 6;
            ctx.stroke();
            ctx.setLineDash([]);

            // --- CAGES (BUTS) NÉOBRUTALISTES ---
            ctx.lineWidth = 6;
            ctx.strokeStyle = "#151515";

            // But ennemi (En Haut - Violet)
            ctx.fillStyle = "var(--enemy-color)";
            ctx.fillRect(goalX1, 0, GOAL_WIDTH, 20);
            ctx.strokeRect(goalX1, -5, GOAL_WIDTH, 25); // -5 pour cacher la bordure du haut

            // Notre but (En Bas - Vert)
            ctx.fillStyle = "var(--secondary-color)";
            ctx.fillRect(goalX1, canvas.height - 20, GOAL_WIDTH, 20);
            ctx.strokeRect(goalX1, canvas.height - 20, GOAL_WIDTH, 25);

            // --- DESSIN DES TRAITS ---
            drawnPaths.forEach(p => {
                let isTopZone = p.path[0].y < canvas.height / 2;
                let color = isTopZone ? "var(--enemy-color)" : "var(--secondary-color)";
                drawNeoPath(p.path, color);
            });

            if (currentPath) {
                let isTopZone = currentPath[0].y < canvas.height / 2;
                let color = isTopZone ? "var(--enemy-color)" : "var(--secondary-color)";
                drawNeoPath(currentPath, color, 0.5); // Semi-transparent pendant le tracé
            }

            // --- LE PALET ---
            ctx.beginPath();
            ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI * 2);
            ctx.fillStyle = "var(--primary-color)";
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#151515";
            ctx.stroke();
            ctx.closePath();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
