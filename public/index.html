<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>La Taverne des Jeux</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Bienvenue sur la Taverne des Jeux</h1>
    <p>Choisis un jeu pour commencer la soirée :</p>
    
    <div class="catalogue">
        <div class="game-card" onclick="openGame('/jeux/faussaire/index.html')">
            <h2>Le Faussaire 🎨</h2>
            <p>Jeu de dessin et de bluff (3 à 8 joueurs)</p>
        </div>
    </div>

    <div id="game-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeGame()">&times;</span>
            <iframe id="game-frame" src="" frameborder="0"></iframe>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
